<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>名演手帖 | LUMINARE — 時代を彩る名作と名演を、三分で。</title>
<meta name="description" content="映画・ミュージカル・舞台の名作24本の要約を日本語と英語でさっと読める観劇手帖。AI支配人が新しい作品の要約も作成します。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --stage:#14110F;      /* 漆黒の客席 */
  --card:#201B17;
  --ink:#EDE6D6;        /* 象牙 */
  --mute:#9E937F;
  --gold:#C9A85C;
  --gold-deep:#8F6F35;
  --velvet:#8E2A36;     /* 緞帳の朱 */
  --line:rgba(201,168,92,.22);
  --disp:'Shippori Mincho',serif;
  --body:'Zen Kaku Gothic New',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--body);background:var(--stage);color:var(--ink);line-height:1.8;font-size:15px;
  background-image:radial-gradient(ellipse 90% 50% at 50% -10%, rgba(201,168,92,.10), transparent 60%)}
button{font-family:inherit;cursor:pointer}

/* ---------- header ---------- */
header{padding:calc(env(safe-area-inset-top) + 26px) 20px 0;max-width:760px;margin:0 auto}
.brand-row{display:flex;justify-content:space-between;align-items:flex-start}
h1{font-family:var(--disp);font-weight:800;font-size:30px;letter-spacing:.14em;color:var(--gold)}
.brand-en{font-size:10px;letter-spacing:.42em;color:var(--mute);margin-top:5px;text-transform:uppercase}
.lang-toggle{display:flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;flex-shrink:0}
.lang-toggle button{background:none;border:none;color:var(--mute);font-size:12px;font-weight:700;padding:6px 13px}
.lang-toggle button.on{background:var(--gold);color:#14110F}
.tagline{font-family:var(--disp);font-size:13px;color:var(--mute);margin-top:12px}
.member-line{margin-top:10px;font-size:11px;color:var(--mute);display:flex;align-items:center;gap:6px}
.member-line .dot{width:7px;height:7px;border-radius:50%;background:#5C544A}
.member-line.is-member{color:var(--gold)}
.member-line.is-member .dot{background:var(--gold)}

/* ---------- フィルムストリップ ---------- */
.strip-wrap{max-width:760px;margin:20px auto 0;padding:0 12px}
.strip{background:#0B0908;border-radius:8px;padding:14px 6px;position:relative;overflow:hidden}
.strip::before,.strip::after{content:"";position:absolute;left:0;right:0;height:8px;
  background-image:radial-gradient(circle, #14110F 2.6px, transparent 2.8px);
  background-size:18px 8px;background-position:9px 50%;background-repeat:repeat-x}
.strip::before{top:3px}.strip::after{bottom:3px}
.strip-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.strip-row::-webkit-scrollbar{display:none}
.strip-row img{height:132px;border-radius:3px;flex-shrink:0;filter:saturate(.9) contrast(1.02)}
.strip-cr{font-size:9.5px;color:#6E655A;text-align:right;margin-top:6px;letter-spacing:.1em}

/* ---------- 演目の棚 ---------- */
.shelf-wrap{max-width:760px;margin:20px auto 0;padding:0 20px}
.shelf-label{font-size:10px;letter-spacing:.3em;color:var(--mute);margin-bottom:8px}
.shelf{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.shelf::-webkit-scrollbar{display:none}
.tag-btn{flex-shrink:0;font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.08em;
  color:var(--mute);background:none;border:1px solid var(--line);border-radius:99px;padding:8px 16px}
.tag-btn.on{background:var(--velvet);border-color:var(--velvet);color:var(--ink)}

/* ---------- main ---------- */
main{max-width:760px;margin:0 auto;padding:18px 16px calc(env(safe-area-inset-bottom) + 90px)}
.search{display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.search input{border:none;background:none;outline:none;flex:1;font-size:15px;color:var(--ink)}
.search input::placeholder{color:#6E655A}
.search input::-webkit-search-cancel-button{display:none}
.search span{color:var(--mute)}
.clear-q{display:none;border:none;background:rgba(201,168,92,.2);color:var(--ink);width:24px;height:24px;
  border-radius:50%;font-size:15px;line-height:1;flex-shrink:0;align-items:center;justify-content:center}
.clear-q.show{display:flex}
.count{font-size:11px;color:var(--mute);margin:14px 2px 10px;letter-spacing:.1em}

/* ---------- ランキング ---------- */
.rank-row{display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:10px 14px;cursor:pointer}
.rank-no{font-family:var(--disp);font-weight:800;width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  border:1.5px solid var(--line);color:var(--mute)}
.rank-item:nth-child(1) .rank-no{background:var(--gold);border-color:var(--gold);color:#14110F}
.rank-item:nth-child(2) .rank-no{background:#8E8A80;border-color:#8E8A80;color:#14110F}
.rank-item:nth-child(3) .rank-no{background:#8A5A3C;border-color:#8A5A3C;color:#EDE6D6}
.rank-item .ttl{font-family:var(--disp);font-weight:700;font-size:14.5px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-item .vc{font-size:11px;color:var(--mute);flex-shrink:0}
.rank-note{font-size:10px;color:var(--mute);margin-top:6px;text-align:right}
.saved-h{font-family:var(--disp);font-size:16px;font-weight:700;margin:26px 2px 12px;color:var(--gold);
  display:flex;align-items:center;gap:8px}
.saved-h::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------- 演目カード（フィルム縁） ---------- */
.film{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:12px;
  overflow:hidden;display:flex;cursor:pointer;transition:transform .15s ease}
.film:active{transform:scale(.985)}
.film .band{width:16px;flex-shrink:0;position:relative}
.film .band::after{content:"";position:absolute;top:6px;bottom:6px;left:50%;width:0;transform:translateX(-50%);
  border-left:5px dotted rgba(20,17,15,.75)}
.film .bd{padding:14px 15px;flex:1;min-width:0}
.film h3{font-family:var(--disp);font-size:17.5px;font-weight:700;line-height:1.45}
.film .meta{font-size:12px;color:var(--mute);margin-top:3px}
.film .tags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.tag{font-size:10.5px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:var(--mute)}
.tag.genre{border-color:var(--gold-deep);color:var(--gold)}
.lockbadge{align-self:center;margin-right:14px;flex-shrink:0;width:40px;height:40px;border-radius:50%;
  border:1.5px solid var(--velvet);color:#D77A85;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:11px;font-weight:700;transform:rotate(-8deg)}
.read-mark{align-self:center;margin-right:14px;flex-shrink:0;width:40px;height:40px;border-radius:50%;
  background:var(--velvet);color:var(--ink);display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:11px;font-weight:700;transform:rotate(-8deg)}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(6,5,4,.72);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center;z-index:50}
.overlay.show{display:flex}
.sheet{background:#1B1714;width:100%;max-width:760px;max-height:88vh;overflow-y:auto;
  border-radius:18px 18px 0 0;padding:24px 22px calc(env(safe-area-inset-bottom) + 28px);
  border-top:2px solid var(--gold-deep);animation:up .28s ease}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@media (prefers-reduced-motion:reduce){.sheet{animation:none}}
.sheet .grip{width:42px;height:4px;border-radius:99px;background:#3A332C;margin:0 auto 18px}
.sheet .eyebrow{font-size:10px;letter-spacing:.32em;color:var(--gold);margin-bottom:6px}
.sheet h2{font-family:var(--disp);font-size:23px;font-weight:800;line-height:1.4}
.sheet .sub{font-size:13px;color:var(--mute);margin-top:5px}
.sheet .rule{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:16px 0}
.sheet .summary{font-size:15px;line-height:2.05;text-align:justify}
.sheet .themes{margin-top:16px;font-size:12.5px;color:var(--gold);background:rgba(201,168,92,.08);
  border-left:3px solid var(--gold-deep);padding:10px 13px;border-radius:0 8px 8px 0}
.detail-btn{margin-top:16px;width:100%;background:none;border:1.5px dashed var(--gold-deep);color:var(--gold);
  border-radius:10px;padding:12px;font-size:13px;font-weight:700;letter-spacing:.05em}
.detail-body{margin-top:14px;font-size:14.5px;line-height:2.05;text-align:justify;
  border-top:1px solid var(--line);padding-top:14px}
.detail-body .d-label{font-size:10px;letter-spacing:.3em;color:var(--gold);margin-bottom:8px}
.btnrow{display:flex;gap:10px;margin-top:22px}
.btn{flex:1;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;letter-spacing:.05em}
.btn.primary{background:var(--gold);color:#14110F}
.btn.ghost{background:none;border:1.5px solid var(--line);color:var(--mute)}
.btn.velvet{background:var(--velvet);color:var(--ink)}
.btn:disabled{opacity:.5}
.pay-seal{width:74px;height:74px;border-radius:50%;border:2px solid var(--velvet);color:#D77A85;
  display:flex;align-items:center;justify-content:center;margin:4px auto 14px;
  font-family:var(--disp);font-weight:800;font-size:15px;transform:rotate(-8deg)}
.pay-copy{text-align:center;font-size:13.5px;color:var(--mute)}
.pay-copy strong{color:var(--ink)}
.pass-input{width:100%;margin-top:16px;padding:13px;border:1.5px solid var(--line);border-radius:10px;
  font-size:16px;text-align:center;letter-spacing:.2em;background:#14110F;color:var(--ink);outline:none}
.pass-input:focus{border-color:var(--gold)}
.pay-err{color:#D77A85;font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.pay-note{font-size:11px;color:var(--mute);text-align:center;margin-top:14px;line-height:1.7}

/* ---------- AI支配人 ---------- */
.ai-panel{background:linear-gradient(135deg,#26100F,#3A1A20);border:1px solid var(--line);
  border-radius:14px;padding:22px 18px;margin-top:26px}
.ai-panel .eyebrow{font-size:10px;letter-spacing:.32em;color:var(--gold);margin-bottom:6px}
.ai-panel h2{font-family:var(--disp);font-size:20px;font-weight:800}
.ai-panel p{font-size:12.5px;color:var(--mute);margin-top:8px}
.ai-form{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.ai-form input{padding:13px;border-radius:10px;border:1px solid var(--line);
  background:rgba(20,17,15,.6);color:var(--ink);font-size:15px;outline:none}
.ai-form input::placeholder{color:#7A6F60}
.ai-form input:focus{border-color:var(--gold)}
.ai-status{font-size:12px;color:var(--gold);min-height:18px;margin-top:8px}
.empty{font-size:12.5px;color:var(--mute);text-align:center;padding:18px;border:1px dashed var(--line);border-radius:10px}

#toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 24px);transform:translate(-50%,20px);
  background:#26211C;color:var(--ink);font-size:13px;padding:11px 18px;border-radius:99px;
  border:1px solid var(--gold-deep);opacity:0;pointer-events:none;
  transition:opacity .25s ease,transform .25s ease;z-index:60;max-width:88vw;text-align:center}
#toast.show{opacity:1;transform:translate(-50%,0)}

footer{max-width:760px;margin:40px auto 0;padding:0 16px 30px;font-size:10.5px;color:var(--mute);
  text-align:center;letter-spacing:.08em;line-height:2}
footer a{color:var(--gold);text-decoration:none}
</style>
</head>

<main>

  <section id="rankBox" style="display:none">

  <section class="ai-panel" id="aiPanel">
    <div class="eyebrow">AI CONCIERGE</div>
    <h2 id="aiTitle">AI支配人 — 観たい一本を要約</h2>
    <p id="aiDesc">看板にない映画や舞台も、題名を入れるだけでAI支配人が日英の要約と結末までのあらすじを書き下ろします。（会員機能）</p>
    <div class="ai-form">
      <input id="aiBook" placeholder="作品名（例：ニュー・シネマ・パラダイス）">
      <input id="aiAuthor" placeholder="監督・演出（任意）">
      <button class="btn velvet" id="aiBtn" onclick="aiSummarize()">要約を作成する</button>
    </div>
    <div class="ai-status" id="aiStatus"></div>
  </section>

  <div class="saved-h" id="savedH">AI試写室の記録</div>
  <div id="savedList"></div>
</main>

<div class="overlay" id="bookOverlay" onclick="if(event.target===this)closeBook()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="eyebrow" id="mEyebrow"></div>
    <h2 id="mTitle"></h2>
    <div class="sub" id="mSub"></div>
    <div class="rule"></div>
    <div class="summary" id="mSummary"></div>
    <div class="themes" id="mThemes"></div>
    <button class="detail-btn" id="mDetailBtn" onclick="toggleDetail()"></button>
    <div class="detail-body" id="mDetail" style="display:none"></div>
    <div class="btnrow">
      <button class="btn ghost" onclick="closeBook()" id="mClose">閉じる</button>
      <button class="btn primary" id="mReadBtn" onclick="toggleRead()"></button>
    </div>
  </div>
</div>

<div class="overlay" id="payOverlay" onclick="if(event.target===this)closePay()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="pay-seal">會員</div>
    <h2 style="text-align:center;font-family:var(--disp)" id="payTitle">観劇会員になる</h2>
    <p class="pay-copy" id="payCopy" style="margin-top:10px"></p>
    <input class="pass-input" id="passInput" placeholder="TOMO-XXXX" autocapitalize="characters" autocomplete="off">
    <div class="pay-err" id="payErr"></div>
    <div class="btnrow"><button class="btn velvet" onclick="checkPass()" id="payUnlock">解錠する</button></div>
    <div class="btnrow" style="margin-top:10px">
      <button class="btn primary" onclick="window.open(CONFIG.PURCHASE_URL,'_blank')" id="payBuy">合言葉を入手する（Noteメンバー）</button>
    </div>
    <p class="pay-note" id="payNote"></p>
  </div>
</div>

<div id="toast"></div>

<footer>
  <span id="footNote">要約・あらすじはすべて当手帖による書き下ろしです。作品からの引用は含みません。</span><br>
  © 叡智の灯火 <a href="iyashi.html">AIと作った 癒しのコーナー</a>
</footer>

 s:{ja:"欧州歴訪中の王女アンは、過密な公務に耐えかねてローマの夜へ抜け出し、米国人新聞記者ジョーと出会う。身分を隠した王女と、特ダネ目当てを隠した記者。スペイン階段、ジェラート、スクーターの疾走——たった一日の自由が、二人の心を本物の恋に変えていく。だが王女には帰るべき場所があった。",
 en:"Princess Ann, suffocating under royal duty on a European tour, slips out into the Roman night and is found by American reporter Joe Bradley. She hides her identity; he hides his scoop. One stolen day of gelato, Vespa rides, and the Mouth of Truth turns a charade into real love—but a princess has somewhere she must return."},
 th:{ja:"一日だけの自由／身分違いの恋／別れの気品",en:"One day of freedom · love across stations · a farewell with grace"}},

 en:"In wartime Casablanca, waystation of refugees, cynical saloon-keeper Rick sees the woman who once abandoned him in Paris walk into his gin joint—with her husband, a hero of the Resistance, seeking two letters of transit. Between old love and a greater cause, the man who sticks his neck out for nobody must choose."},

 th:{ja:"音楽が家族を癒す／アルプス越えの逃避行／ドレミの歌",en:"Music heals a family · flight over the Alps · Do-Re-Mi"}},
{t:{ja:"雨に唄えば",en:"Singin' in the Rain"},a:{ja:"S・ドーネン&G・ケリー監督",en:"dir. Donen & Kelly"},c:{ja:"アメリカ",en:"USA"},y:1952,g:{ja:"ミュージカル",en:"Musical"},col:"#4A6B8A",
 s:{ja:"サイレントからトーキーへ——映画界の大転換期。人気スターのドンは、悪声の相手役リナに悩まされながら、新人女優キャシーと恋に落ちる。傘を放り出し、土砂降りの街角で踊る例の場面は、映画史上もっとも幸福な数分間。ミュージカル映画の最高峰と呼ばれる快作。",
 en:"Hollywood, at the shattering moment silent film becomes talkie. Star Don Lockwood, saddled with a leading lady whose voice could curdle milk, falls for chorus girl Kathy—and dubs her voice over Lina's. The title number, danced through a downpour with a discarded umbrella, remains the happiest few minutes ever filmed."},
 th:{ja:"土砂降りのタップ／トーキー革命の裏側／幸福の絶頂",en:"Tap in the downpour · the talkie revolution · pure joy on film"}},
{t:{ja:"東京物語",en:"Tokyo Story"},a:{ja:"小津安二郎 監督",en:"dir. Yasujirō Ozu"},c:{ja:"日本",en:"Japan"},y:1953,g:{ja:"日本映画",en:"Japanese Film"},col:"#7E8CA0",
 s:{ja:"尾道に暮らす老夫婦が、東京の子どもたちを訪ねる。だが医者の長男も美容師の長女も忙しく、心から二人をもてなすのは戦死した次男の妻・紀子だけだった。誰も悪くない。それでも家族は少しずつ他人になっていく——静かな画面に人生のすべてを湛えた、世界映画史の頂点。",
 en:"An elderly couple travels from seaside Onomichi to visit their grown children in Tokyo—who are too busy for them. Only Noriko, widow of their son killed in the war, offers real kindness. No one is villainous; families simply drift apart. In its stillness, often voted the greatest film ever made."},
 th:{ja:"親と子の距離／紀子の優しさ／「東京、見物しましたよ」",en:"Parents and children · Noriko's kindness · life as it passes"}},
{t:{ja:"タイタニック",en:"Titanic"},a:{ja:"J・キャメロン監督",en:"dir. James Cameron"},c:{ja:"アメリカ",en:"USA"},y:1997,g:{ja:"ロマンス",en:"Romance"},col:"#2F5D73",
 s:{ja:"処女航海の豪華客船で、上流階級の娘ローズと、賭けで乗船券を手にした画家志望の青年ジャックが出会う。身分の壁を越えて燃え上がる恋。しかし北大西洋の夜、船は氷山と出会ってしまう。沈みゆく巨船を舞台にした愛と生存の物語は、世界中の涙を誘った不滅の大作。",
 en:"On the maiden voyage of the unsinkable ship, first-class Rose, suffocating in her gilded cage, meets Jack, a penniless artist who won his ticket in a poker game. Their love defies the ship's rigid decks—until the iceberg. An epic of romance and survival that made the whole world weep."},
 th:{ja:"船首のあの場面／沈没の90分／「決して手放さない」",en:"The bow scene · the sinking hour · a promise never to let go"}},
{t:{ja:"千と千尋の神隠し",en:"Spirited Away"},a:{ja:"宮﨑駿 監督",en:"dir. Hayao Miyazaki"},c:{ja:"日本",en:"Japan"},y:2001,g:{ja:"アニメ",en:"Animation"},col:"#8A5A78",
 s:{ja:"引っ越しの途中で迷い込んだ不思議な町。両親を豚に変えられた10歳の千尋は、名前を奪われ「千」として湯婆婆の湯屋で働くことになる。カオナシ、ハク、釜爺——奇妙な住人たちの中で、臆病だった少女は自分の足で立つことを学んでいく。アカデミー賞に輝いた日本アニメの金字塔。",
 en:"Wandering into a deserted theme park, ten-year-old Chihiro watches her parents turn into pigs. Stripped of her name, she must work in a bathhouse for the gods under the witch Yubaba, aided by the mysterious boy Haku and shadowed by the lonely No-Face. A timid girl learns to stand on her own—Japan's Oscar-winning animated masterpiece."},
 th:{ja:"名前と自分／湯屋の住人たち／カオナシの孤独",en:"Names and selfhood · the bathhouse of gods · No-Face's loneliness"}},
{t:{ja:"風と共に去りぬ",en:"Gone with the Wind"},a:{ja:"V・フレミング監督",en:"dir. Victor Fleming"},c:{ja:"アメリカ",en:"USA"},y:1939,g:{ja:"名画",en:"Classic"},col:"#996633",
 s:{ja:"南北戦争前夜の南部。農園の令嬢スカーレットは、戦火にすべてを奪われながら、その強欲なまでの生命力で何度でも立ち上がる。彼女を愛し続けた皮肉屋レットとの結婚も、届かぬ初恋への執着が壊していく。炎のアトランタ、赤い大地タラ——映画史上空前の大河ロマン。",
 en:"On the eve of the Civil War, Scarlett O'Hara loses everything to the flames—and claws it all back with ruthless vitality. Rhett Butler loves her; her obsession with another man destroys them. Burning Atlanta, the red earth of Tara, and the most famous exit line in cinema: an epic without equal in Hollywood's golden age."},
 th:{ja:"炎上するアトランタ／タラの誓い／別れの名台詞",en:"Atlanta in flames · the vow at Tara · that famous last line"}},
{t:{ja:"市民ケーン",en:"Citizen Kane"},a:{ja:"O・ウェルズ監督",en:"dir. Orson Welles"},c:{ja:"アメリカ",en:"USA"},y:1941,g:{ja:"名画",en:"Classic"},col:"#4A4A55",
 s:{ja:"新聞王ケーンが遺した最期の言葉「バラのつぼみ」。その謎を追う記者の取材を通して、貧しい少年が富と権力の頂点に上り、すべてを持ちながら孤独に死んでいった生涯が、多面的に浮かび上がる。25歳のウェルズが撮影・脚本・主演を兼ねた、映画技法の革命。",
 en:"A newspaper tycoon dies alone in his unfinished palace, whispering 'Rosebud.' A reporter's search for the word's meaning assembles, from conflicting memories, the life of a man who had everything and kept nothing. Orson Welles, twenty-five, directed, co-wrote, and starred—rewriting film grammar in one stroke."},
 th:{ja:"「バラのつぼみ」の謎／富と孤独／映像技法の革命",en:"The Rosebud mystery · wealth and loneliness · a revolution in technique"}},
{t:{ja:"ゴッドファーザー",en:"The Godfather"},a:{ja:"F・F・コッポラ監督",en:"dir. Francis Ford Coppola"},c:{ja:"アメリカ",en:"USA"},y:1972,g:{ja:"名画",en:"Classic"},col:"#3A2E2A",
 s:{ja:"ニューヨークのマフィア、コルレオーネ家。老いたドンが撃たれたとき、家業と無縁に生きるはずだった三男マイケルの運命が動き出す。家族への愛が、彼を静かに、確実に、闇の帝王へと変えていく。結婚式に始まり洗礼式に終わる、罪と家族の一大叙事詩。",
 en:"The Corleones of New York: when the aging Don is gunned down, it is Michael—the war-hero son meant to stay clean—whose destiny turns. Love of family transforms him, quietly and completely, into the thing he swore he'd never become. From a wedding to a baptism of blood: the great American epic of crime and kin.",},
 th:{ja:"ドンの貫禄／マイケルの変貌／洗礼式の粛清",en:"The Don's gravity · Michael's transformation · the baptism montage"}},
{t:{ja:"2001年宇宙の旅",en:"2001: A Space Odyssey"},a:{ja:"S・キューブリック監督",en:"dir. Stanley Kubrick"},c:{ja:"イギリス/アメリカ",en:"UK/USA"},y:1968,g:{ja:"SF",en:"Sci-Fi"},col:"#1F2A3A",
 s:{ja:"猿人が骨を空へ放り投げると、それは宇宙船に変わる——人類の夜明けから木星探査へ、400万年を一瞬でつなぐ映画史上最も大胆なカット。謎の黒石板モノリス、反乱する人工知能HAL9000、そして言葉を超えたラストの啓示。SF映画のすべてがここから始まった。",
 en:"An ape hurls a bone into the sky; it becomes a spaceship—four million years bridged in cinema's boldest cut. The black monolith, the softly mutinous computer HAL 9000, and a wordless final passage beyond Jupiter and beyond understanding. Every science-fiction film since lives in its shadow."},
 th:{ja:"モノリス／HALの反乱／言葉を超えた結末",en:"The monolith · HAL's mutiny · an ending past words"}},
{t:{ja:"十二人の怒れる男",en:"12 Angry Men"},a:{ja:"S・ルメット監督",en:"dir. Sidney Lumet"},c:{ja:"アメリカ",en:"USA"},y:1957,g:{ja:"名画",en:"Classic"},col:"#5C5470",
 s:{ja:"父親殺しの罪に問われた少年。評決は全員一致が条件だが、蒸し暑い陪審室で一人だけが「無罪」に票を投じる。「話し合うべきだと思っただけです」。偏見と思い込みが一つずつ剥がされていく密室劇は、民主主義そのものを描いた不朽の傑作。",
 en:"A slum boy stands accused of killing his father; the verdict must be unanimous. In a sweltering jury room, eleven vote guilty—and one man votes not guilty, 'because we should talk first.' One room, twelve men, and the slow dismantling of prejudice: the essential drama of democracy itself."},
 th:{ja:"密室の心理戦／偏見の解体／一人の勇気",en:"One room, twelve minds · prejudice dismantled · one man's doubt"}},
{t:{ja:"サイコ",en:"Psycho"},a:{ja:"A・ヒッチコック監督",en:"dir. Alfred Hitchcock"},c:{ja:"アメリカ",en:"USA"},y:1960,g:{ja:"サスペンス",en:"Suspense"},col:"#26262B",
 s:{ja:"会社の金を持ち逃げした女が、雨の夜、寂れたベイツ・モーテルに辿り着く。内気な青年ノーマンと、丘の上の屋敷に住む「母親」。そしてシャワールームで、映画史がひっくり返る。主役が物語の途中で退場するという禁じ手と、45秒に70カットの衝撃。スリラーの原点にして頂点。",
 en:"A woman on the run with stolen cash checks into the lonely Bates Motel, run by shy Norman and overseen by his 'mother' in the house on the hill. Then the shower curtain opens, and film history splits in two. Killing the star mid-picture, seventy cuts in forty-five seconds: the thriller's origin and its summit."},
 th:{ja:"シャワーの45秒／ベイツ・モーテル／衝撃の真相",en:"The shower scene · the Bates Motel · the reveal"}},
{t:{ja:"ショーシャンクの空に",en:"The Shawshank Redemption"},a:{ja:"F・ダラボン監督",en:"dir. Frank Darabont"},c:{ja:"アメリカ",en:"USA"},y:1994,g:{ja:"名画",en:"Classic"},col:"#4E6B7A",
 s:{ja:"妻殺しの冤罪でショーシャンク刑務所に送られた銀行員アンディ。調達屋のレッドと友情を結び、図書室を作り、所長の裏金を管理しながら、彼は19年間、誰にも言わない希望を胸に抱き続けていた。「希望はいいものだよ。多分最高のものだ」。世界中で愛され続ける魂の脱獄劇。",
 en:"Banker Andy Dufresne, wrongly convicted of his wife's murder, endures Shawshank prison with quiet dignity—befriending the fixer Red, building a library, laundering the warden's money—while nursing, for nineteen years, a hope he tells no one. 'Hope is a good thing, maybe the best of things.' The world's most beloved story of patience and freedom."},
 th:{ja:"19年の希望／レッドとの友情／雨の中の解放",en:"Nineteen years of hope · Red's friendship · freedom in the rain"}},
{t:{ja:"フォレスト・ガンプ",en:"Forrest Gump"},a:{ja:"R・ゼメキス監督",en:"dir. Robert Zemeckis"},c:{ja:"アメリカ",en:"USA"},y:1994,g:{ja:"名画",en:"Classic"},col:"#6B8C50",
 s:{ja:"「人生はチョコレートの箱のようなもの」。知能は人より少し劣るが、誰よりまっすぐな心と俊足を持つフォレストは、フットボール、ベトナム戦争、卓球外交、エビ漁と、戦後アメリカ史を駆け抜けていく。彼が生涯変わらず想い続けるのは、幼なじみのジェニーただ一人だった。",
 en:"'Life is like a box of chocolates.' Forrest Gump—slow of mind, pure of heart, fast of foot—runs through three decades of American history: football fields, Vietnam, ping-pong diplomacy, a shrimp empire. Through it all he loves one person only: Jenny, the girl from the bus. A folk tale of goodness outrunning cleverness."},
 th:{ja:"走り続ける人生／ジェニーへの一途／羽根の舞う冒頭と結末",en:"A life at a run · devotion to Jenny · the drifting feather"}},
{t:{ja:"羅生門",en:"Rashomon"},a:{ja:"黒澤明 監督",en:"dir. Akira Kurosawa"},c:{ja:"日本",en:"Japan"},y:1950,g:{ja:"日本映画",en:"Japanese Film"},col:"#6E4423",
 s:{ja:"藪の中で武士が死んだ。盗賊、武士の妻、死者の霊、目撃した木こり——四人が語る事件の顛末は、それぞれ都合よく食い違う。真実はどこにあるのか、そもそも在るのか。豪雨の羅生門で交わされる問いは、世界に「ラショーモン効果」という言葉を生み、日本映画を世界へ開いた。",
 en:"A samurai lies dead in a grove. The bandit, the wife, the dead man's ghost, and a woodcutter each tell what happened—and each account flatters its teller. Where is truth, and does it exist at all? The film that gave the world the phrase 'Rashomon effect' and threw open the gates of Japanese cinema."},
 th:{ja:"食い違う四つの証言／人間のエゴ／それでも人を信じる結末",en:"Four conflicting truths · human ego · a final act of faith"}},
{t:{ja:"ニュー・シネマ・パラダイス",en:"Cinema Paradiso"},a:{ja:"G・トルナトーレ監督",en:"dir. Giuseppe Tornatore"},c:{ja:"イタリア",en:"Italy"},y:1988,g:{ja:"名画",en:"Classic"},col:"#8C6E3E",
 s:{ja:"シチリアの小さな村の映画館パラダイス座。映写技師アルフレードと、映画に魅せられた少年トト。老技師は少年に技術と人生を教え、やがて「村を出ろ、二度と戻るな」と送り出す。30年後、大監督となったトトのもとに訃報が届き、遺されたフィルム缶が回りはじめる——映画への愛そのものを描いた永遠の名作。",
 en:"In a Sicilian village, the Cinema Paradiso is the world, and projectionist Alfredo is a father to movie-mad little Totò. He teaches the boy his craft, then orders him: leave, and never come back. Thirty years later, a famous director returns for a funeral—and a reel of spliced-together kisses says everything words cannot."},
 th:{ja:"映写室の師弟／「戻ってくるな」／ラストのキスシーン集",en:"The projection booth · 'don't come back' · the final reel of kisses"}},
{t:{ja:"ウエスト・サイド物語",en:"West Side Story"},a:{ja:"R・ワイズ&J・ロビンス監督",en:"dir. Wise & Robbins"},c:{ja:"アメリカ",en:"USA"},y:1961,g:{ja:"ミュージカル",en:"Musical"},col:"#8A3038",
 s:{ja:"ニューヨークの路地裏で対立する二つの少年グループ、ジェット団とシャーク団。その狭間で、トニーとマリアが恋に落ちる——『ロミオとジュリエット』の現代版として。指を鳴らして踊る抗争、非常階段の逢瀬、「トゥナイト」の高揚。ダンスで語られる悲恋の金字塔。",
 en:"On New York's West Side, the Jets and the Sharks rule rival blocks—and across that line, Tony and Maria fall in love: Romeo and Juliet reborn in fire escapes and finger-snaps. Rumbles danced like ballets, 'Tonight' sung into the night, and a tragedy that choreography makes unbearable and beautiful at once."},
 th:{ja:"抗争のバレエ／非常階段の恋／「トゥナイト」",en:"Rumbles as ballet · the fire-escape romance · Tonight"}},
{t:{ja:"オペラ座の怪人",en:"The Phantom of the Opera"},a:{ja:"A・ロイド＝ウェバー作",en:"by Andrew Lloyd Webber"},c:{ja:"イギリス（舞台）",en:"UK (Stage)"},y:1986,g:{ja:"舞台",en:"Stage"},col:"#3A2440",
 s:{ja:"パリ・オペラ座の地下に棲む仮面の男は、若きコーラスガール、クリスティーヌを「音楽の天使」として密かに育てていた。彼女が脚光を浴びたとき、怪人の愛は独占と狂気へ傾いていく。落下するシャンデリア、地底湖のゴンドラ——世界でもっとも観られ続けるミュージカルの帝王。",
 en:"Beneath the Paris Opera lives a masked genius who has secretly trained the young soprano Christine as his 'Angel of Music.' When she rises to stardom—and to another man's arms—his love curdles into obsession. The falling chandelier, the candlelit lake: the most-seen musical on earth, still casting its spell."},
 th:{ja:"シャンデリアの落下／地底湖の航行／仮面の下の孤独",en:"The chandelier · the underground lake · the face behind the mask"}},
{t:{ja:"レ・ミゼラブル（舞台版）",en:"Les Misérables (Musical)"},a:{ja:"ブーブリル&シェーンベルク作",en:"by Boublil & Schönberg"},c:{ja:"フランス/イギリス（舞台）",en:"France/UK (Stage)"},y:1985,g:{ja:"舞台",en:"Stage"},col:"#39508A",
 s:{ja:"一切れのパンを盗んで19年。ユゴーの大河小説が、魂を揺さぶる歌の連なりに生まれ変わった。ジャン・ヴァルジャンの祈り、ファンティーヌの「夢やぶれて」、バリケードに翻る赤旗と「民衆の歌」。世界中でロングランを続ける、ミュージカル史上最も壮大な感動作。",
 en:"Nineteen years for a loaf of bread. Hugo's vast novel reborn as an unbroken river of song: Valjean's prayer, Fantine's I Dreamed a Dream, the red flag over the barricade and the swell of the people's anthem. The most epic of all musicals, still running around the world."},
 th:{ja:"民衆の歌／ヴァルジャンの祈り／バリケードの群像",en:"Do You Hear the People Sing · Valjean's prayer · the barricade"}},
{t:{ja:"キャッツ",en:"Cats"},a:{ja:"A・ロイド＝ウェバー作",en:"by Andrew Lloyd Webber"},c:{ja:"イギリス（舞台）",en:"UK (Stage)"},y:1981,g:{ja:"舞台",en:"Stage"},col:"#5B4B2A",
 s:{ja:"年に一度の満月の夜、都会のごみ捨て場に猫たちが集う舞踏会「ジェリクルボール」。長老猫はこの夜、天上へ昇り新しい生を得る一匹を選ぶ。かつての栄光を失った娼婦猫グリザベラが歌う「メモリー」が客席を包むとき、舞台と観客の境界は消えている。T・S・エリオットの詩から生まれた奇跡。",
 en:"Once a year, under the Jellicle moon, the cats of a junkyard gather for the ball where their elder will choose one soul to be reborn. When the fallen glamour cat Grizabella sings Memory, the theatre itself seems to hold its breath. Born from T. S. Eliot's poems: dance, spectacle, and one immortal song."},
 th:{ja:"「メモリー」／ジェリクルボール／客席まで来る猫たち",en:"Memory · the Jellicle Ball · cats in the aisles"}},
{t:{ja:"ライオンキング（舞台版）",en:"The Lion King (Musical)"},a:{ja:"J・テイモア演出",en:"dir. Julie Taymor"},c:{ja:"アメリカ（舞台）",en:"USA (Stage)"},y:1997,g:{ja:"舞台",en:"Stage"},col:"#A6502E",
 s:{ja:"開幕の「サークル・オブ・ライフ」——客席の通路を象やキリンが行進した瞬間、観客は皆サバンナにいる。父を殺された子ライオン、シンバの成長と王位奪還の物語を、アフリカの音楽と、人形と役者が一体化した革命的な舞台美術で描く。世界中で四半世紀を超えて満員が続く、劇場の奇跡。",
 en:"The opening Circle of Life—elephants and giraffes parading down the aisles—puts the entire audience on the savanna. Simba's exile and return is told through African rhythm and Julie Taymor's revolutionary masks and puppetry, where performer and animal become one. A quarter century on, still the theatre's great spectacle."},
 th:{ja:"開幕の動物たちの行進／仮面と人形の革命／王の帰還",en:"The opening procession · masks and puppetry · the king returns"}},
{t:{ja:"ハムレット",en:"Hamlet"},a:{ja:"シェイクスピア作",en:"by William Shakespeare"},c:{ja:"イングランド（舞台）",en:"England (Stage)"},y:1601,g:{ja:"舞台",en:"Stage"},col:"#2A4073",
 s:{ja:"デンマークの王子ハムレットの前に、亡き父の亡霊が現れる。「私は弟に毒殺された」。叔父は王冠と母を奪った男。復讐を誓いながら、王子は狂気を装い、確信と懐疑のあいだで揺れ続ける。「生きるべきか、死ぬべきか」——四百年間、あらゆる名優が挑み続ける演劇の最高峰。",
 en:"The ghost of Denmark's king appears to his son: I was murdered by my brother—the man who now wears my crown and weds my queen. Sworn to revenge, Hamlet feigns madness and hesitates between certainty and doubt. To be or not to be: for four centuries, the summit every great actor must attempt."},
 th:{ja:"亡霊の告発／狂気と逡巡／剣と毒の結末",en:"The ghost's charge · feigned madness · swords and poison"}},
