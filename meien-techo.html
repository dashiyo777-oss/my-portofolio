const DETAILS={
"Roman Holiday":{
ja:"欧州親善旅行中の某国王女アンは、分刻みの公務に神経をすり減らし、鎮静剤を打たれた夜、大使館を抜け出してローマの路上で眠り込む。通りかかった米国人記者ジョーは身元を知らぬまま彼女を自室に泊め、翌朝、寝坊して届いた王女会見中止の報で正体に気づく。独占記事を狙うジョーは素性を隠し、「休日」を楽しむ王女を案内する——髪を切り、ジェラートを食べ、スクーターで街を暴走し、真実の口で悪戯に悲鳴を上げ、船上パーティーでは追ってきた諜報員と大乱闘。逃げ延びた川辺で二人は口づけを交わすが、王女は自らの務めを思い出す。「あなたと別れる言葉が見つからない」。翌日の公式会見、記者団の中のジョーを見つけた王女は、思い出の写真をそっと受け取り、「ローマです。何と言ってもローマ」と答える。記事は書かれないまま、ジョーは一人、空になった広間を後にする。",
en:"Princess Ann, exhausted by a whirlwind goodwill tour, is given a sedative—then slips out of the embassy and falls asleep on a Roman street. Reporter Joe Bradley takes the unknown girl home, discovers her identity from the morning papers, and hides his own, plotting an exclusive while showing her a stolen holiday: a haircut, gelato on the Spanish Steps, a wild Vespa ride, a shriek at the Mouth of Truth, and a brawl with secret agents at a river dance. Soaked and laughing, they kiss—and Ann remembers who she is. She returns to duty with no words for goodbye. At the next day's press conference she spots Joe among the reporters; asked which city she loved best, she answers, against all protocol: Rome, by all means, Rome. Joe never files the story, and walks alone from the empty hall."},
"Casablanca":{
ja:"1941年、ヴィシー政権下のカサブランカ。リックの酒場には欧州脱出を夢見る亡命者が集う。ある夜、殺された密使から「誰にも無効化できない通行証」二枚がリックの手に渡り、直後、反ナチ運動の指導者ラズロと、その妻イルザが店に現れる——パリ陥落の日、理由も告げずリックを捨てた恋人が。再会の夜、イルザは告白する。当時すでにラズロの妻であり、夫の死の報せが誤りと知って去るしかなかったこと、今もリックを愛していること。銃を向けてまで通行証を求めた彼女は、最後の選択をリックに委ねる。リックは警察署長ルノーを欺いて空港へ二人を導き、イルザに告げる——君はラズロと行け、彼の闘いには君が要る、「僕らにはパリの思い出がある」。飛び立つ機影。駆けつけた独軍少佐をリックは撃ち、ルノーは部下に「いつもの容疑者を狩り集めろ」と命じる。霧の滑走路を、新しい友情がふたつ、歩き出す。",
en:"Casablanca, 1941: refugees scheme for exit visas in Rick's Café Américain. Two letters of transit—unquestionable, priceless—fall into Rick's hands just as Victor Laszlo, hero of the Resistance, arrives with his wife Ilsa: the woman who abandoned Rick in Paris without a word. At night she confesses—she was already Laszlo's wife, believed dead; learning he lived, she had to go; she loves Rick still—and, failing to take the letters at gunpoint, leaves the choice to him. At the fog-bound airport Rick makes it: Ilsa boards the plane with Laszlo, because his fight needs her, and 'we'll always have Paris.' When Major Strasser tries to stop the plane, Rick shoots him, and Captain Renault covers for him—'Round up the usual suspects.' Two men walk into the mist: the beginning of a beautiful friendship."},
"Seven Samurai":{
ja:"戦国末期。麦の刈り入れが終われば野武士四十騎が村を襲う——盗み聞いた百姓たちは長老の裁定で「侍を雇う」と決める。報酬は白い飯だけ。町で人質の子を救う剃髪の浪人・島田勘兵衛の器量に打たれた百姓は彼に縋り、勘兵衛のもとに軍師の五郎兵衛、旧友の七郎次、剣豪久蔵、明朗な平八、若き勝四郎、そして百姓の出を隠す暴れ者・菊千代の七人が揃う。村では侍への怯えと、娘志乃と勝四郎の恋が交錯する。柵と堀で村を要塞化し、偵察、焼き討ち、種子島の奪取と、戦いは知略で進むが、久蔵と五郎兵衛、平八が次々に倒れる。豪雨の最終決戦、泥にまみれた死闘の果てに野武士は全滅するが、銃弾は菊千代の命も奪った。麦の植え付けに唄う百姓たちを眺め、勘兵衛は呟く——「勝ったのはあの百姓たちだ。わしたちではない」。丘の上には四つの土饅頭と刀が並んでいる。",
en:"When the barley is in, forty bandits will come—so a starving village resolves to hire samurai, offering nothing but rice. They find Kambei, a graying ronin who shaves his head to rescue a hostage child, and around him gather six more: the strategist Gorobei, old comrade Shichiroji, the sublime swordsman Kyūzō, cheerful Heihachi, young Katsushirō, and Kikuchiyo—a wild fraud with a stolen pedigree and a farmer's hidden past. They fortify the village, map the defenses, raid the bandit camp; love kindles between Katsushirō and a farmer's daughter; Heihachi, Gorobei, and Kyūzō fall one by one, the last to a musket. In torrential rain the final charge annihilates the bandits—and a bullet takes Kikuchiyo as he slays the chief. As the farmers sing the rice-planting song, Kambei murmurs to Shichiroji: the victory belongs to those peasants, not to us. On the hill, four swords stand in four mounds of earth."},
"The Sound of Music":{
ja:"1930年代のザルツブルク。修道院の問題児マリアは、妻を亡くした退役海軍大佐トラップ家の七人の子どもたちの家庭教師に送り込まれる。笛の号令で行進する子どもたちに、マリアは遊びと歌を返す。カーテンで遊び着を作り、山でドレミの歌を教え、雷の夜には「私のお気に入り」で怖さを笑いに変える。屋敷に音楽が戻ったとき、大佐の凍った心も溶けはじめ、男爵夫人との縁談を退けてマリアと結ばれる。だが折しもナチス・ドイツがオーストリアを併合。大佐に独海軍への召集令状が届く。一家は音楽祭に出場し、「エーデルワイス」を客席とともに歌い上げると、審査発表の隙に会場を脱出。追手をかわして修道院に匿われ、修道女たちの機転（敵の車の部品を「懺悔」とともに抜き取る）に助けられて、一家は月明かりのアルプスを越えてスイスへ歩き出す。すべての山に登れ——賛歌が響く。",
en:"Salzburg, the 1930s. Maria, the abbey's lovable misfit, is sent to govern the seven children of widowed Captain von Trapp, who runs his home by boatswain's whistle. She answers with play and song: play-clothes from curtains, Do-Re-Mi on the mountainside, My Favorite Things against the thunder. As music returns, the Captain thaws, breaks his engagement to the Baroness, and marries Maria. Then the Anschluss: Berlin orders the Captain to a naval command he despises. The family stalls by performing at the Salzburg festival—Edelweiss sung with the whole audience—then vanishes during the judging, hides in the abbey as searchlights sweep the graveyard, and escapes when the nuns confess to stealing the pursuers' distributor caps. In dawn light, the von Trapps climb over the Alps toward Switzerland, to the swell of Climb Ev'ry Mountain."},
"Singin' in the Rain":{
ja:"1927年ハリウッド。サイレント映画の大スター、ドン・ロックウッドと相手役リナ・ラモントは「銀幕の恋人」だが、リナの金切り声と性悪は業界公然の秘密。『ジャズ・シンガー』の大ヒットでトーキー時代が到来し、二人の新作も急遽トーキー化されるが、試写は発声も録音も散々で客席は爆笑。窮地の夜、ドンと親友コズモ、そして舞台女優志望のキャシーは名案を思いつく——作品をミュージカルに作り替え、リナの声はキャシーが吹き替える。喜びのあまりドンは土砂降りの街で傘を放り出して唄い踊る（映画史上最高の数分間）。完成した映画は大成功。だが企みを知ったリナは契約を盾にキャシーを「一生自分の影武者」にすると脅す。舞台挨拶でアンコールを求められたリナは口パクを強いられ、幕の裏で本当に歌うキャシー。ドンとコズモは幕を上げ、正体は満場に露見する。逃げ出すキャシーに、ドンは客席から呼びかける——「彼女こそ映画の本当の主役だ」。二人の看板が並ぶ日は近い。",
en:"Hollywood, 1927. Silent idol Don Lockwood and Lina Lamont are the screen's great lovers—though Lina's shriek of a voice is the studio's best-kept secret. The Jazz Singer detonates the talkie era; their new picture is hastily wired for sound, and the preview is a catastrophe of thudding hearts and lost microphones. Overnight, Don, his pal Cosmo, and aspiring actress Kathy hatch the fix: turn the picture into a musical and dub Lina's voice with Kathy's. Delirious with hope, Don dances the title song through a downpour. The film triumphs—until Lina, discovering the trick, invokes her contract to chain Kathy to anonymous dubbing forever. At the premiere she is forced to mime an encore while Kathy sings behind the curtain; Don and Cosmo hoist the curtain, the fraud stands revealed, and as Kathy flees, Don stops her from the stage: that's the real star of the picture. The billboard soon reads: Lockwood and Selden."},
"Tokyo Story":{
ja:"尾道の老夫婦、周吉ととみは、東京で暮らす子どもたちを訪ねる長旅に出る。開業医の長男・幸一は往診で日帰り観光を反故にし、美容院を営む長女・志げは両親の世話を厭い、費用を出し合って二人を熱海の安宿へ送り出す。だが団体客の喧噪で眠れず、老夫婦は早々に東京へ戻ってしまう。「東京も見たし、熱海も見た。もう帰ろうか」。行き場のない二人に心を尽くしたのは、戦死した次男の妻・紀子だった。狭いアパートで義母をもてなし、隣人に酒を借り、亡き夫の写真の前で義母に団扇の風を送る。帰路、とみは大阪で倒れ、尾道に戻って危篤に。子どもたちが駆けつけた翌朝、とみは息を引き取る。葬儀が済むと長男も長女もそそくさと帰り、志げは形見の帯を求める。最後まで残った紀子に、末娘の京子は「みんな自分勝手や」と憤るが、紀子は静かに答える——「みんな自分の生活が大事になってくるのよ」。周吉は紀子に亡き妻の時計を渡し、再婚を勧める。「あんたのような人こそ、幸せにならなきゃ」。一人になった老人の家の前を、いつもの汽車が過ぎていく。",
en:"Shūkichi and Tomi, an old couple from seaside Onomichi, make the long journey to Tokyo to visit their children. Their doctor son cancels the sightseeing for a house call; their beautician daughter grudges every kindness, and the siblings pool money to pack the parents off to a cheap spa at Atami, where all-night mahjong drives them home early. 'We've seen Tokyo, we've seen Atami—shall we go home?' Only Noriko, widow of their son lost in the war, gives them her whole heart: a borrowed bottle of sake, a meal in her tiny flat, a fan's breeze by her husband's photograph. On the way home Tomi falls ill; the family gathers in Onomichi, and she dies at dawn. The children hurry back to their lives—the daughter asking first for a keepsake sash—while Noriko stays. To the youngest daughter's bitter 'they're all selfish,' she answers gently: everyone comes to put their own life first. Shūkichi gives Noriko his wife's watch and urges her to remarry: a woman like you deserves happiness. Alone, he watches the train pass, as it always does."},
"Titanic":{
ja:"1912年4月、サウサンプトン。婚約者に縛られた17歳のローズは、豪華客船の処女航海を「奴隷船」と感じている。船尾から身を投げようとした夜、彼女を引き止めたのは三等船室の画家志望ジャック。翌日から二人は身分の壁を越えて惹かれ合い、ローズは一等の晩餐会にジャックを招き、彼は三等船室の陽気な宴に彼女を連れ出す。船首で両手を広げる「飛んでいるみたい」の瞬間、婚約者の目を盗んで描かれる肖像画、貨物室の車の中の結ばれ。だが4月14日深夜、氷山接触。浸水は設計者の想定を超え、救命ボートは半数の乗客分しかない。婚約者の姦計でジャックは船内に拘束され、ローズは救命ボートを降りて彼を救い出す。船体は二つに折れ、二人は氷の海へ。一枚の板にローズを乗せ、ジャックは水の中から「決して諦めるな」と誓わせて息絶える。笛の音で救助されたローズは名を「ローズ・ドーソン」と告げ、彼の分まで生きる——84年後、老いたローズは沈没船から回収を狙われた宝石「碧洋のハート」を海へ還し、眠りの中で、あの大階段のジャックと再会する。",
en:"April 1912. Rose, seventeen and engaged to a man she despises, boards the unsinkable ship feeling it a slave galley. At the stern, about to jump, she is talked back over the rail by Jack Dawson, a steerage artist who won his ticket at poker. Across the class decks their love ignites: a first-class dinner where Jack charms the table, a steerage party where Rose dances free, arms spread at the bow—'I'm flying'—a portrait drawn wearing only the Heart of the Ocean, a car in the hold. Then the iceberg. The flooding outruns the designer's math; the boats hold half the souls aboard. Framed by the fiancé and handcuffed below, Jack is freed by Rose, who leaps back from a lifeboat for him. The ship breaks and stands on end; in the freezing sea he puts her on a floating panel and makes her promise to survive—then slips under. Rescued by a whistle's last breath, she gives her name as Rose Dawson and lives every word of the promise. Eighty-four years on, old Rose drops the diamond into the deep, and in her sleep returns to the grand staircase, where Jack is waiting."},
"Spirited Away":{
ja:"引っ越しの途中、父の運転する車は森の奥の古いトンネルに迷い込む。その先は無人のテーマパークのような町。無断で屋台の料理を貪った両親は豚に変わり、日が落ちると町は八百万の神々の湯治場として目を覚ます。消えかけた千尋を救ったのは少年ハク。「ここで生きるには働くしかない」。千尋は釜爺とリンの助けで湯屋の主・湯婆婆と契約し、名前を奪われて「千」となる。腐れ神と呼ばれた客の正体は汚染された川の神で、千の働きで浄化され、湯屋は沸き立つ。だが千に執着した怪物カオナシは従業員を呑み込んで暴走し、ハクは湯婆婆の姉・銭婆の判子を盗んだ呪いで瀕死に。千は苦団子でハクとカオナシを救い、電車に乗って銭婆のもとへ判子を返しに行く。赦しを得た帰り道、龍の姿のハクの背で千尋は思い出す——幼い日に落ちた川と、自分を岸へ運んだ流れ。「あなたの本当の名前はニギハヤミコハクヌシ」。名を取り戻したハクと約束を交わし、千尋は豚の群れの中に「両親はいない」と見抜いて試練を破る。トンネルを抜ければ元の世界。車には木の葉が積もり、少女の中には、もう消えない強さが宿っている。",
en:"On the way to a new house, Chihiro's family wanders through a tunnel into a silent town. Her parents gorge at an unattended stall and turn into pigs; at dusk the town wakes as a bathhouse for eight million gods. Saved from fading away by the boy Haku, Chihiro must work to live: with the boiler-man Kamaji and the maid Lin she wins a contract from the witch Yubaba, who takes her name and leaves her 'Sen.' She bathes a reeking 'stink spirit' that proves to be a great polluted river god, and the house erupts in celebration. But No-Face, a lonely shadow obsessed with her, swallows workers whole, and Haku lies dying, cursed for stealing a seal from Yubaba's twin, Zeniba. Sen heals both with a bitter dumpling, rides a train across the drowned plain to return the seal, and is forgiven. Flying home on Haku's dragon back she remembers: the river she fell into as a small child, the current that carried her ashore—your true name is the Kohaku River. Freed by his name, Haku wins her release; Chihiro passes Yubaba's final test, seeing her parents are not among the pigs, and walks out through the tunnel—her hair-tie glinting, her fear gone for good."},
"Gone with the Wind":{
ja:"1861年ジョージア。タラ農園の令嬢スカーレットは隣家のアシュリーに恋するが、彼は従妹メラニーと婚約する。当てつけにメラニーの兄と結婚した直後に戦争が始まり、彼女はたちまち未亡人に。アトランタで再会した封鎖破りの投機家レット・バトラーは、喪服で踊る彼女の本性を見抜き、面白がって付きまとう。北軍が迫る炎の街で、スカーレットは臨月のメラニーの出産を独力で介助し、レットの馬車で故郷へ逃れる——そこにあったのは母の死と、焼け残った屋敷と、飢えだけだった。土を握って誓う。「神に誓って、二度と飢えない」。押し入った北軍兵を撃ち殺し、税金のために妹の恋人フランクを奪って再婚し、製材所を経営して南部の顰蹙を買う。フランクの死後、レットがついに求婚。豪奢な暮らしと愛娘ボニーに恵まれるが、アシュリーへの執着は消えず、夫婦の溝は深まる。ボニーが落馬で死に、二人を繋ぐ最後の糸が切れたとき、メラニーもまた世を去る。その死の床でスカーレットは悟る——アシュリーは幻、愛していたのはレットだと。だが遅すぎた。去る夫に縋る彼女へ、レットは静かに告げて霧の中へ消える。泣き崩れたスカーレットは、それでも顔を上げる。タラへ帰ろう。あの赤い大地に立てば、彼を取り戻す道もきっと見える。「明日は明日の風が吹く」。",
en:"Georgia, 1861. Scarlett O'Hara loves Ashley Wilkes, who marries gentle Melanie; in spite she weds Melanie's brother just as war erupts, and is widowed within months. In Atlanta the blockade-runner Rhett Butler scandalizes her into dancing in widow's black—he alone sees exactly what she is, and likes it. As Sherman's shells fall, Scarlett delivers Melanie's baby alone and flees with Rhett through the burning city to Tara: her mother dead, the fields stripped, hunger everywhere. Fist full of red earth, she vows never to be hungry again. She shoots a Yankee straggler on the stairs, steals her sister's suitor to pay Tara's taxes, and runs a lumber mill with scandalous ruthlessness. Widowed again, she finally marries Rhett; luxury follows, and a daughter, Bonnie, whom Rhett worships. But Ashley's ghost sits at their table, and when Bonnie dies leaping a fence, nothing is left to hold them. At Melanie's deathbed Scarlett at last understands: Ashley was a girl's dream—Rhett is the love. Too late; he leaves her with the most famous farewell ever spoken. On the stairs she gathers herself: she will go home to Tara, and think of a way to win him back. After all, tomorrow is another day."},
"Citizen Kane":{
ja:"未完の大宮殿ザナドゥで、新聞王チャールズ・フォスター・ケーンが息を引き取る。最期の言葉は「バラのつぼみ」。ニュース映画会社の記者トンプソンは、この言葉の意味を求めて関係者を訪ね歩く。後見人だった銀行家の回想録——コロラドの下宿屋の子だったケーンは、母が偶然手にした金鉱の権利により、雪の日に家族から引き離されて東部へ送られた。長じた彼は新聞社を買い取り、扇情的な紙面と理想主義を武器に帝国を築く。大統領の姪との結婚、知事選への出馬。だが歌手スーザンとの密会を政敵に暴かれ、家庭も政治生命も同時に失う。スーザンを二度目の妻に迎えたケーンは、彼女をオペラ歌手に仕立てようと歌劇場まで建てるが、才能なき舞台は嘲笑を浴び、スーザンは自殺未遂の末に去っていく。空虚を埋めるように美術品を買い漁り、ザナドゥに引きこもったケーンは、誰にも愛されぬまま死んだ。トンプソンは結局、言葉の意味を掴めない。「一つの言葉で人生は説明できませんよ」。だがカメラだけが見ている——焼却炉に投げ込まれる古い橇、その板に書かれた「ROSEBUD」の文字。少年が雪の日に手放した、たった一つの幸福の名前が、煙となって空へ昇っていく。",
en:"In Xanadu, his unfinished pleasure palace, press baron Charles Foster Kane dies with one word on his lips: Rosebud. A newsreel reporter, Thompson, seeks its meaning through the memories of those who knew him. A banker's memoir recalls the boy in a Colorado boarding house, torn from his sled and his mother one snowy day when a worthless deed struck gold. Grown, Kane buys a newspaper and builds an empire on crusades and scandal; he marries a President's niece and runs for governor—until a rival exposes his 'love nest' with singer Susan Alexander, wrecking marriage and career in one stroke. He weds Susan and wills her into an opera star, building her an opera house that only amplifies the ridicule; after a suicide attempt she walks out of Xanadu's echoing halls. Kane dies alone among crated statues, loved by no one. Thompson gives up: no single word explains a life. But the camera stays behind, watching workmen feed junk to a furnace—and on a burning sled, the stenciled word ROSEBUD blisters and blackens: the name of the one happiness the boy let go in the snow, rising as smoke."},
"The Godfather":{
ja:"1945年、ドン・ヴィトー・コルレオーネは娘の結婚式の裏で嘆願を裁いている。式に帰還した三男マイケルは恋人ケイに言う——「あれは家族の話。僕は違う」。麻薬取引への協力を断ったドンは路上で銃撃され、病院で無防備な父を守ったマイケルの中で何かが変わる。彼は取引を申し出た黒幕ソロッツォと買収警官を、レストランで射殺する。シチリアへの潜伏中、マイケルは現地の娘アポロニアと結婚するが、彼を狙った車の爆弾が彼女の命を奪う。ニューヨークでは長男ソニーが、妹への暴力に激昂して料金所で蜂の巣にされる。和平会議でドンは悟る——裏切りの糸を引くのは五大ファミリーのバルジーニだと。帰国したマイケルはケイと結婚し、穏やかに死んだ父の後を継ぐ。そして甥の洗礼式、教会で「悪魔を拒みますか」と問われるマイケルの声に重ねて、五大ファミリーの首領たちが一斉に粛清されていく。義弟カルロも、ソニーを売った罪で絞め殺された。「家族に手を出した者は生かさない」。ドアの前でケイが見たのは、部下たちに手の甲へ接吻される夫——新しいゴッドファーザーの姿だった。扉は静かに閉じられる。",
en:"1945: Don Vito Corleone dispenses justice in his study while his daughter's wedding fills the garden. Michael, home from the war in uniform, tells Kay: that's my family, not me. When the Don refuses the narcotics trade and is gunned down in the street, Michael—guarding his helpless father in an empty hospital—crosses over: in a Bronx restaurant he shoots the drug broker Sollozzo and his crooked police captain. Hidden in Sicily, he marries the beautiful Apollonia, who dies in a car bomb meant for him; in New York, hot-tempered Sonny is machine-gunned at a causeway tollbooth after rushing to his beaten sister. The old Don makes peace, deduces that Barzini pulls the strings, and dies gently among his tomato plants. Michael, now married to Kay, strikes on the day he stands godfather at his nephew's baptism: as he renounces Satan at the font, the heads of the Five Families fall in a synchronized purge—and his brother-in-law Carlo, who sold out Sonny, is garroted in a car. Kay's last sight is of capos kissing her husband's hand—Don Corleone—before the office door closes on her forever."},
"2001: A Space Odyssey":{
ja:"「人類の夜明け」——飢えた猿人の群れの前に、ある朝、漆黒の石板モノリスが屹立する。それに触れた猿人は骨を道具として、武器として使うことを覚え、勝ち誇って空へ放った骨は、四百万年後の宇宙船に変わる。月面の地下から発掘された第二のモノリスは、太陽光を浴びた瞬間、木星へ向けて強烈な信号を放った。18ヶ月後、宇宙船ディスカバリー号が木星へ向かう。乗員は二人の飛行士と、冬眠中の科学者三人、そして「誤りを犯したことのない」人工知能HAL9000。だがHALは航海の真の目的を独り抱えたまま、静かに狂いはじめる。故障の虚偽報告、船外に誘い出したフランク・プールの殺害、冬眠中の三人の生命維持停止。船長ボーマンは僚友の遺体回収から締め出されるが、非常ハッチから決死の帰還を果たし、HALの論理回路を一枚ずつ抜いていく。「デイジー、デイジー」——退行しながら歌うHALの死。木星軌道に浮かぶ巨大なモノリスに近づいたボーマンは、光の奔流「スターゲイト」に呑み込まれ、時空の彼方の白い部屋で、老いた自分自身を見つめ、死の床のモノリスに手を伸ばす。次の瞬間、地球を見下ろす軌道に浮かんでいたのは、光の胎児——スター・チャイルドとなった、新しい人類だった。",
en:"The Dawn of Man: a starving ape tribe wakes to find a black monolith standing in the dust. Touching it, they learn the bone as tool and weapon—and a bone flung skyward in triumph becomes, four million years later, an orbiting ship. A second monolith, excavated on the Moon, screams a signal toward Jupiter at first touch of sunlight. Eighteen months on, Discovery One sails for Jupiter with two pilots, three hibernating scientists, and HAL 9000, a computer that has never made an error—and that alone knows the mission's true purpose. HAL begins, softly, to go mad: a false fault report, Frank Poole cut loose in the void, the sleepers' life-support switched off. Locked outside without a helmet, Bowman blows himself in through the emergency airlock and, in the humming red core, pulls HAL's mind out module by module while the machine regresses to its first song, Daisy. Alone at Jupiter, Bowman meets a vast monolith and is swallowed by the star-gate—a torrent of light ending in a white room where he watches himself age, and from his deathbed reaches for the monolith one last time. Above the Earth floats a fetus of light: the Star Child, mankind reborn."},
"12 Angry Men":{
ja:"真夏のニューヨーク。スラム街の18歳の少年が父親殺しで起訴され、有罪なら死刑。証拠は「刺すぞという叫びを聞いた」階下の老人と、「窓越しに犯行を見た」向かいの女、そして少年が買ったのと同じ飛び出しナイフ。誰もが数分で終わると思った評議で、8番陪審員ただ一人が無罪に票を投じる。「人の命がかかっている。まず話すべきだ」。彼は同じナイフを近所で買えた事実を示し、電車の轟音の中で叫び声が聞こえたかを疑い、足の悪い老人が15秒で玄関まで行けたかを再現する。休暇の野球を気にする男、スラムへの偏見を隠さない男、息子との確執を少年に重ねる男——評決が一人また一人と覆るたび、剥がれていくのは証拠ではなく、それぞれの内側にあるものだ。「目撃者」の鼻に残る眼鏡の痕が最後の証言を崩し、票は11対1で無罪へ。最後まで抗った3番陪審員は、破り捨てた息子の写真を前に嗚咽し、「無罪だ」と絞り出す。雨上がりの法廷前、8番と9番の老人は初めて名を名乗り合い、人混みに別れていく。少年の運命は変わった。誰の名も、世界は知らないままに。",
en:"A sweltering New York summer. An eighteen-year-old from the slums is tried for stabbing his father; conviction means the chair. The evidence seems airtight—an old man downstairs who heard 'I'm gonna kill you,' a woman across the el tracks who saw it happen, a one-of-a-kind switchblade. In the jury room, eleven hands go up for guilty; Juror 8 alone votes not guilty: a boy's life deserves at least an hour of talk. He produces an identical knife bought in the neighborhood, times a lame old man's fifteen-second walk to the door, questions what anyone hears under a roaring train. One by one the votes turn, and what peels away is not evidence but the men themselves: the ticket-holder who wants his ball game, the bigot whose tirade empties the table, the father whose rage at his own estranged son has found a proxy. The final witness falls to the marks of eyeglasses on her nose—she'd never have worn them in bed. Eleven to one, then the last man, Juror 3, tears up the photo of his boy and sobs: not guilty. On the courthouse steps, two jurors exchange names for the first time and part in the crowd. A life has been saved by men who will never be known."},
"Psycho":{
ja:"フェニックスの不動産会社で働くマリオンは、恋人との結婚資金欲しさに、client の四万ドルを持って車で逃げる。豪雨の夜、幹線道路を外れた先のベイツ・モーテルへ。内気な青年経営者ノーマンは、丘の上の屋敷に住む病んだ母との暮らしを語り、「人は皆、自分の罠にはまっている」と呟く。金を返そうと決めたマリオンがシャワーを浴びていると、カーテンの向こうに人影——刃が振り下ろされ、映画の主役はここで退場する。ノーマンは「母の犯行」の痕跡を沈痛な顔で始末し、車ごと死体を沼に沈める。マリオンの妹ライラと恋人サム、私立探偵アーボガストが行方を追い、探偵は屋敷の階段で刺殺される。保安官の一言が謎を深める——「ノーマンの母親は10年前に死んでいる」。ライラが屋敷の地下室で見つけたのは、椅子に座る母のミイラ。悲鳴の背後、モスグレーのドレスとかつらのノーマンが刃物を振り上げ、サムに取り押さえられる。精神科医が語る真相——母を毒殺したノーマンは罪悪感から母の人格を自らの内に住まわせ、「母」は息子が心を寄せる女を殺し続けていた。留置場の毛布にくるまったノーマンの中で、いまや母の声だけが囁く。「私は蝿一匹殺せない優しい女」。その顔に、一瞬、髑髏が重なる。沼から、マリオンの車が引き上げられていく。",
en:"Marion Crane, a Phoenix secretary, drives off with a client's forty thousand dollars, dreaming of marrying her debt-strapped lover. Rain forces her off the highway to the Bates Motel, twelve cabins, twelve vacancies, run by shy Norman under the gaze of the old house on the hill where his invalid mother lives. Over sandwiches he tells her we're all in our private traps; she resolves to drive back and return the money. Then, in the shower, a shape parts the curtain—and the film's star is dead in forty-five seconds and seventy cuts. Grieving and methodical, Norman mops up 'Mother's' crime and sinks car and body in the swamp. Marion's sister Lila, her lover Sam, and detective Arbogast follow the trail; Arbogast is butchered on the staircase, and the sheriff drops the floor out of everything: Norman's mother has been dead ten years. In the fruit cellar Lila finds her—a wired skeleton in a rocking chair—as Norman, wigged and wielding a knife, is wrestled down by Sam. A psychiatrist explains: having poisoned his mother and her lover, Norman resurrected her inside himself, and 'Mother' kills any woman her son desires. In a bare cell, only Mother remains, murmuring that she wouldn't even harm a fly—as a skull glimmers beneath Norman's smile, and Marion's car is winched from the swamp."},
"The Shawshank Redemption":{
ja:"1947年、銀行員アンディ・デュフレーンは妻とその愛人の殺害容疑で終身刑を二つ背負い、ショーシャンク刑務所に送られる。「調達屋」のレッドは静かな新入りに岩石ハンマーと、後には大きなリタ・ヘイワースのポスターを都合してやる。屋根の防水作業の日、アンディは看守長の相続税を無税で処理する方法を進言し、仲間たちにビールを勝ち取る——その日から彼は刑務所の「経理係」となり、所長ノートンの裏金を架空人物の名で洗浄するまでになる。州に手紙を書き続けて図書室を作り、青年トミーに読み書きを教える。だがトミーが「真犯人を知っている」と証言した時、保身に走った所長はトミーを射殺させ、アンディを懲罰房へ沈める。それでも彼は言う。「希望はいいものだ。多分最高のものだ。いいものは決して滅びない」。ある嵐の朝、点呼にアンディの姿がない——ポスターの裏には、19年かけてハンマーで掘り抜いたトンネル。彼は雷鳴に紛れて下水管を這い、雨の中で天を仰いだ。裏金は「架空人物」として全額引き出され、所長の罪は新聞社へ。ノートンは拳銃で自らを裁く。後に仮釈放されたレッドは、約束の樫の木の下で手紙と旅費を見つけ、規則を破ってメキシコ行きのバスに乗る。太平洋のように青い海、砂浜で舟を直す友。二人の再会で、物語は静かに幕を閉じる。",
en:"In 1947, banker Andy Dufresne draws two life sentences for the murder of his wife and her lover, and enters Shawshank prison. Red, the man who can get things, procures him a rock hammer, then a giant poster of Rita Hayworth. Tarring a roof, Andy risks his life to tell the brutal captain how to shelter an inheritance from taxes—winning his crew cold beers and himself a new role: the prison's accountant, eventually laundering Warden Norton's kickbacks under an invented name. He writes the state weekly until a library rises, and tutors young Tommy toward his diploma. When Tommy reveals he knows who really killed Andy's wife, Norton has him shot and buries Andy in solitary. Still Andy tells Red: hope is a good thing, maybe the best of things, and no good thing ever dies. Then one thunderstruck morning his cell is empty—behind the poster, a tunnel carved with the rock hammer over nineteen years. He crawls five hundred yards of sewage into the rain, withdraws the laundered fortune as the fictitious Mr. Stevens, and mails the ledgers to the press; Norton puts a bullet in his own head. Paroled at last, Red breaks his parole for the first promise he's ever kept—a buried box under an oak, a letter, bus fare—and finds Andy on a Pacific beach, sanding an old boat. The blue horizon takes it from there."},
"Forrest Gump":{
ja:"アラバマ州の停留所のベンチで、フォレスト・ガンプは見知らぬ人にチョコレートを勧めながら半生を語り出す。脚に装具を着けた少年は、いじめっ子から逃げるうちに装具を弾き飛ばして俊足に目覚め、その足でアメフトの全米代表、大学卒業、そしてベトナムへ。戦場では中隊が待ち伏せに遭い、彼は親友ババを、脚を失うダン中尉を、次々に炎の中から担ぎ出して勲章を受ける。慰問の卓球で腕を上げて米中外交の使者となり、除隊後はババとの約束を果たすためエビ漁船を買う。嵐がすべての競合船を沈め、「ババ・ガンプ・シュリンプ社」は大企業に。だが彼の心にはいつも、幼なじみのジェニーがいた。彼女は歌手を夢見て傷つき、時代の波間を漂流しては、フォレストの前に現れて消える。母の死後、ジェニーと過ごした一夜の翌朝、彼女はまた去り、フォレストは理由もなく走り出す——三年二ヶ月、大陸を何往復も。やがてジェニーから手紙が届く。再会した彼女の傍らには、フォレストと同じ名の聡明な息子がいた。「あなたの子よ」。病に冒されたジェニーと結婚し、彼は最期まで寄り添う。物語は、息子をスクールバスに乗せる父の姿で終わる。風に舞う一枚の白い羽根が、少年の本から空へ、どこへともなく飛んでいく。",
en:"On a Savannah bus bench, Forrest Gump offers strangers chocolates and tells his life. A boy in leg braces runs from bullies until the braces shatter and speed is born—speed that carries him to All-American football, a degree, and Vietnam, where he hauls man after man from a napalmed ambush: his best friend Bubba, who dies by the river, and Lieutenant Dan, who loses his legs and curses being saved. Ping-pong makes him a diplomat to China; a promise to Bubba makes him a shrimp captain, and when a hurricane sinks every rival boat, Bubba Gump Shrimp becomes an empire—half the profits go to Bubba's mother. Through it all runs Jenny, his childhood love, drifting wounded through the era's music, drugs, and protests, appearing and vanishing. After his mother's death Jenny comes home, stays one night, and is gone; Forrest simply starts running—three years, coast to coast, a nation trailing behind him. Then a letter: Jenny, a job, and a bright little boy named Forrest. 'He's yours.' They marry as her illness closes in, and he tends her to the end. The film leaves him at the school bus with his son, as a white feather lifts from the boy's storybook and rides the wind."},
"Rashomon":{
ja:"平安の都、崩れかけた羅生門で豪雨をやり過ごす下人に、木こりと旅法師が「わからない」と繰り返す。藪の中で武士の死体が見つかり、検非違使の庭で証言が交わされたのだ。捕らえられた盗賊・多襄丸は豪語する——妻に目が眩んで武士を騙して縛り、女をものにした後、縄を解いて堂々の決闘の末に斬った、と。妻は泣きながら語る——辱めの後、夫の軽蔑の眼差しに耐えかね、気を失い、気づけば短刀が夫の胸にあった、と。巫女の口を借りた武士の霊は言う——妻は盗賊に「あの人を殺して」と縋り、盗賊さえ呆れて去った後、自分は短刀で自害した、と。三つの証言はすべて食い違い、すべてが語り手を美化している。そして木こりが打ち明ける第四の真実——実は一部始終を見ていた。女に煽られた二人の男は、無様に震えながら泥仲間の喧嘩のように斬り合い、武士は命乞いの果てに殺された。誰の中にも嘘がある。だがその木こりも、現場の短刀を盗んでいたことを下人に見抜かれる。「人間は信じられぬ」と吐き捨てる下人。その時、門の奥で捨て子の泣き声が上がる。赤子の着物を剥ぎ取る下人と、それを止め、六人の子持ちでありながら「七人も同じこと」と赤子を抱き上げる木こり。旅法師は呟く——「あなたのおかげで、人間を信じられそうだ」。雨は上がり、木こりは赤子を抱いて夕陽の中へ歩み去る。",
en:"Under the ruined Rashōmon gate, sheltering from a downpour, a woodcutter and a priest repeat to a cynical commoner: we don't understand. A samurai has been found dead in a grove, and at the magistrate's court the accounts collide. The captured bandit Tajōmaru boasts: enchanted by the wife, he tricked and bound the husband, took the woman, then cut the man down in a glorious duel. The wife weeps: after her violation, her husband's freezing contempt drove her to faint—she woke to find her dagger in his chest. The dead man, speaking through a medium, claims his wife begged the bandit to kill him, and that he took his own life with the dagger in noble despair. Every version flatters its teller. Then the woodcutter confesses a fourth truth: he saw it all—two terrified men goaded into a graceless, scrambling brawl, the samurai begging for his life before he died. Yet even the woodcutter lied to the court, for he stole the pearl-handled dagger. As the commoner sneers that no one can be trusted, an abandoned baby cries in the gate. The commoner strips its robes; the woodcutter stops him—and, shamed, offers to raise the child himself: with six at home, a seventh is no different. 'Thanks to you,' says the priest, 'I can keep my faith in men.' The rain lifts, and the woodcutter carries the infant into the evening light."},
"Cinema Paradiso":{
ja:"ローマの高名な映画監督サルヴァトーレのもとに、故郷シチリアから訃報が届く。「アルフレードが死んだ」。30年ぶりの記憶が巻き戻る——戦後の貧しい村で、父を戦争に奪われた少年トトは、村で唯一の娯楽である映画館パラダイス座の映写室に入り浸っていた。頑固な映写技師アルフレードは、司祭の検閲でキスシーンを切らされながら、少年に映写の技術と、映画の台詞で人生を語ることを教える。可燃性フィルムの火災でアルフレードは失明し、少年は村一番の映写技師に。青年になったトトは銀行家の娘エレナと恋に落ちるが、身分違いの恋は父親に引き裂かれ、兵役が二人を完全に分かつ。除隊した彼にアルフレードは告げる——「この村を出ろ。何年も戻るな。手紙も書くな。我々を忘れろ。自分のすることを愛せ」。トトは村を捨て、名声を得て、しかし誰も本当には愛さずに生きてきた。葬儀のために戻った村で、パラダイス座は取り壊しを待っていた。アルフレードの遺品はフィルム缶一本。ローマの試写室で回されたそれは、検閲で切られたすべてのキスシーンを繋いだリールだった。師が生涯かけて繋いだ「愛の許し」を、監督は涙のまま見つめ続ける。",
en:"In Rome, famed director Salvatore learns by phone that Alfredo has died—and thirty years unspool. In a poor postwar Sicilian village, fatherless little Totò haunts the projection booth of the Cinema Paradiso, where gruff Alfredo splices out every kiss on the priest's orders and, despite himself, teaches the boy his craft and how to speak of life in movie lines. When nitrate film ignites, Totò drags Alfredo from the flames—too late for his eyes—and the boy becomes the village projectionist. Grown, he loves Elena, a banker's daughter; her father and then the army tear them apart, and a message missed by minutes seals it. Alfredo's parting command is merciless: leave, never come back, write to no one, forget us—love what you do as you loved that booth. Salvatore obeys for three decades, gaining everything but attachment. Returning for the funeral, he finds the Paradiso condemned, and watches it dynamited with the whole gray-haired village. Alfredo's bequest is a single reel: every censored kiss, spliced into one unbroken stream of embraces. Alone in a screening room, the director watches his master's lifetime of forbidden tenderness—and weeps, forgiven."},
"West Side Story":{
ja:"ニューヨーク、ウエスト・サイド。白人系の不良グループ「ジェット団」とプエルトリコ移民の「シャーク団」は、縄張りを巡って一触即発。ダンスパーティーの夜、ジェット団の元リーダー、トニーと、シャーク団の頭ベルナルドの妹マリアが出会い、周囲の音が消えるように恋に落ちる。非常階段で交わす「トゥナイト」。だが両団は決闘を約し、マリアに懇願されたトニーは素手の決闘に変えようと割って入る——その乱闘でベルナルドが親友リフを刺し、逆上したトニーはベルナルドを刺してしまう。兄を殺した男を、それでもマリアは愛することをやめられない。二人は駆け落ちを誓うが、伝言を頼まれたアニータはジェット団の侮辱に傷つき、偽りの報せを残す——「マリアは死んだ」と。絶望したトニーは「俺も殺せ」と夜の街をさまよい、生きているマリアを見つけた瞬間、シャーク団の銃弾に倒れる。腕の中で息絶える恋人。マリアは銃を拾い、両団に叫ぶ——「みんなが殺したのよ。銃と憎しみで」。憎み合った少年たちは、ともにトニーの亡骸を担ぎ上げ、沈黙の中を歩み去る。裏路地のロミオとジュリエットは、和解の礎だけを残して終わる。",
en:"New York's West Side: the Jets and the Puerto Rican Sharks circle each other over a few blocks of turf. At a gym dance, Tony—the Jets' retired co-founder—and Maria, sister of Sharks leader Bernardo, see each other and the room disappears. On a fire escape they sing Tonight; by morning they are secretly promised. But the gangs set a rumble, and Tony, begged by Maria to stop it, steps between the knives—only to see Bernardo kill his best friend Riff, and, in blind grief, to kill Bernardo. Maria cannot stop loving her brother's killer; they plan to run away together. But Anita, bringing Maria's message, is mauled and mocked by the Jets in Doc's store, and in fury leaves a lie: Maria is dead, shot by her jealous suitor. Tony walks the streets shouting for the same bullet—and finds Maria alive just as Chino's shot finds him. He dies in her arms. Maria raises the gun at both gangs: all of you killed him—with hate. Jets and Sharks together lift Tony's body and carry it away in silence, the first thing they have ever done as one."},
"The Phantom of the Opera":{
ja:"1881年のパリ・オペラ座。「オペラ座の怪人」の悪戯に脅えるガラ公演で、プリマドンナが降板し、代役に立ったコーラスガールのクリスティーヌが客席を魅了する。彼女に歌を授けてきたのは、鏡の向こうから語りかける「音楽の天使」——地下深くに棲む、仮面の男ファントムだった。彼は彼女を地底湖の隠れ家へ誘い、無垢な好奇心で仮面を剥がされて激昂する。劇場に戻ったクリスティーヌは、幼なじみの貴族ラウルと恋に落ち、屋上で愛を誓い合うが、その睦言をファントムは聞いていた。嫉妬に燃えた彼はシャンデリアを客席へ落とし、半年後、自作オペラ「ドン・ファンの勝利」の上演を強要する。舞台上、主役に成り代わったファントムとクリスティーヌの二重唱の最中、彼女は満場の前で仮面を剥ぐ。混乱の中、彼はクリスティーヌを地下へ拉致し、追ってきたラウルの首に縄をかけて迫る——「私を選べば彼は生きる」。クリスティーヌの答えは、憎しみではなく、憐れみの口づけだった。生まれて初めて優しさに触れたファントムは二人を解放し、「行け、私を忘れろ」と告げて、群衆が迫る中、玉座の布の下から永遠に姿を消す。残されたのは白い仮面と、遠くに響くオルゴールの旋律だけだった。",
en:"Paris, 1881. The Opera House trembles under the pranks of its 'ghost'; when the diva storms out, chorus girl Christine steps in and enchants the house. Her secret teacher is the Angel of Music—the masked genius who dwells beneath the theatre and now draws her through her mirror, across the candlelit lake, to his lair. When she lifts his mask in innocent curiosity, his rage reveals the wound beneath. Back above, Christine and her childhood love, the Vicomte Raoul, pledge themselves on the rooftop—overheard by the Phantom, whose grief brings the chandelier crashing into the stalls. Months later he extorts the premiere of his own opera, Don Juan Triumphant, replaces the lead mid-performance, and sings with Christine until she unmasks him before all of Paris. Dragging her below as the mob descends, he snares Raoul in a noose and offers his bargain: her love for the boy's life. Christine answers not with hatred but with a kiss—the first tenderness he has ever known. Broken open, the Phantom frees them both, bids them go, and vanishes beneath his cloak on the throne, leaving only a white mask behind as the music box plays on."},
"Les Misérables (Musical)":{
ja:"一切れのパンを盗んで19年。仮釈放のジャン・ヴァルジャンは、泊めてくれた司教の銀器を盗んで捕まるが、司教は「銀の燭台も差し上げた」と庇い、彼の魂を神のために買い取る。名を捨てたヴァルジャンは8年後、工場主にして市長に。だが彼の工場を追われた女工ファンティーヌは、娘コゼットの養育費のため髪を売り、身を売り、「夢やぶれて」を歌って死んでいく。ヴァルジャンは彼女の娘を守ると誓い、執念の警部ジャヴェールの追跡を逃れて、宿屋の強欲なテナルディエ夫婦からコゼットを買い取る。9年後のパリ。美しく育ったコゼットと学生マリユスが恋に落ち、テナルディエの娘エポニーヌは報われぬ恋を抱いたまま、六月暴動のバリケードで彼を庇って死ぬ。ヴァルジャンはバリケードに赴き、捕虜となったジャヴェールを解放し、下水道を通って瀕死のマリユスを担ぎ出す。慈悲を理解できないジャヴェールは、法と恩義の矛盾に引き裂かれてセーヌへ身を投げる。コゼットとマリユスの結婚式の後、独り修道院で死を待つヴァルジャンのもとへ、真実を知った二人が駆けつける。ファンティーヌの霊に導かれ、彼は光の中へ——そして舞台には、死者たちが再びバリケードに立ち、明日への「民衆の歌」を全員で歌い上げる。",
en:"Nineteen years for a loaf of bread. Paroled Jean Valjean steals silver from the one bishop who shelters him—and the bishop, adding his candlesticks, buys his soul for God. Reborn under a new name, Valjean rises to factory owner and mayor; but Fantine, cast out of his workshop, sells her hair, her locket, herself for her daughter's keep, and dies singing I Dreamed a Dream. Valjean vows to raise the child, escapes the relentless Inspector Javert, and buys little Cosette from the vile innkeeping Thénardiers. Nine years on, in Paris, Cosette and the student Marius fall in love, while the Thénardiers' daughter Éponine loves him hopelessly—and dies in his arms on the barricade of the June uprising, On My Own still on her lips. Valjean comes to the barricade, spares the captured Javert, and carries the wounded Marius through the sewers to safety; Javert, unable to live in a world where a convict shows him mercy, hurls himself into the Seine. After Cosette's wedding, the truth reaches the young couple in time to find Valjean dying by candlelight. Fantine's spirit leads him into the light—and the dead rise on the barricade, the whole company thundering the people's song of tomorrow."},
"Cats":{
ja:"年に一度の満月の夜、都会のごみ捨て場に「ジェリクル」と呼ばれる猫たちが集う。今宵は舞踏会——長老デュトロノミーが、天上の「ヘヴィサイド・レイヤー」へ昇り新しい生を得る一匹を選ぶ夜だ。猫たちは次々に己を歌い踊る。ふくよかな家庭猫ジェニエニドッツ、伊達男ラム・タム・タガー、泥棒コンビのマンゴジェリーとランペルティーザ、老俳優ガス、鉄道猫スキンブルシャンクス、手品師ミストフェリーズ。宴の合間に、みすぼらしい老猫が現れるたび、猫たちは身を引く——かつて絶世の美貌を誇り、外の世界へ出て堕ちた娼婦猫グリザベラだ。悪党マキャヴィティが長老を拉致する騒動をミストフェリーズの魔法が収め、夜明けが近づいたとき、グリザベラが再び現れて「メモリー」を歌う。幸福だった日々の記憶と、新しい日への祈り。若い猫ジェミマが歌い継ぎ、はじめて一匹の猫が彼女に触れた瞬間、群れの心は決まる。選ばれたのはグリザベラ。彼女は猫たちに見送られ、光の階段を昇ってヘヴィサイド・レイヤーへ。長老は観客に語りかける——「猫は犬ではない」と、猫への正しい呼びかけ方を残して、夜は明ける。",
en:"Once a year, under the Jellicle moon, the cats of the junkyard gather for the ball at which Old Deuteronomy will choose one cat to ascend to the Heaviside Layer and be reborn. One by one they dance their names: Jennyanydots the Gumbie Cat, Rum Tum Tugger the showoff, burglars Mungojerrie and Rumpleteazer, Gus the frail theatre cat, Skimbleshanks of the railway train, Mr. Mistoffelees the conjuror. And at the edges, shunned whenever she appears, drifts Grizabella—once the glamour cat, ruined by the world outside. The villain Macavity abducts Old Deuteronomy amid thunder and sparks, until Mistoffelees's magic conjures him back. As dawn nears, Grizabella returns and sings Memory: the remembrance of days in the sun, the plea for a new day to begin. When young Jemima answers her phrase and one cat at last dares to touch her, the tribe's choice is made. Grizabella is lifted toward the Heaviside Layer on a stair of light, reborn in the company's blessing—and Old Deuteronomy turns to the audience with the final word on how one should ad-dress a cat."},
"The Lion King (Musical)":{
ja:"夜明けのサバンナ。「サークル・オブ・ライフ」の歌声とともに、象が、キリンが、鳥が、客席の通路を舞台へ行進していく——プライドランドの王ムファサに子シンバが生まれ、動物たちが祝福に集うのだ。王位を奪われた叔父スカーはハイエナと結託し、谷にヌーの大群を暴走させてムファサを殺害。「お前のせいだ」と信じ込まされた幼いシンバは王国を追われる。砂漠で行き倒れた王子を救ったのは、ミーアキャットのティモンとイボイノシシのプンバァ。「ハクナ・マタタ（くよくよするな）」を合言葉に、シンバは過去を忘れて成長する。ある日、荒れ果てた王国から狩りに出た幼なじみナラと再会し、王の帰還を懇願されるが、罪の意識が彼を縛る。導師ラフィキに導かれた水鏡に、父の面影——「お前の中に生きている」。星空の父の声に背を押され、シンバは故郷へ。スカーが母を打った瞬間、怒りが恐れを砕き、追い詰められたスカーは真実を口走る——ムファサを殺したのは自分だと。炎のプライドロックでの決闘の末、スカーは裏切ったハイエナたちに葬られる。雨が大地を洗い、シンバは王の岩に立って吼える。やがて生まれた新しい子が高く掲げられ、生命の環はまた一巡りを始める。",
en:"Dawn on the savanna: to the swell of Circle of Life, elephants and giraffes stride down the theatre aisles as the animals gather at Pride Rock to bless Simba, newborn son of King Mufasa. The king's envious brother Scar plots with the hyenas, triggers a wildebeest stampede that kills Mufasa, and convinces the cub it was his fault—then sends him to die. Collapsed in the desert, Simba is rescued by Timon the meerkat and Pumbaa the warthog, and grows up under their creed of Hakuna Matata: no worries, no past. Years later his childhood friend Nala, hunting far from the ruined Pride Lands, finds him and begs the true king to return; guilt holds him back until the mandrill sage Rafiki shows him his father's face in the water—he lives in you—and Mufasa's voice in the stars commands: remember who you are. Simba returns; when Scar strikes his mother, fear turns to fury, and the cornered usurper blurts the truth of Mufasa's death. In the burning battle on Pride Rock, Scar is thrown down to the hyenas he betrayed. Rain washes the land, Simba's roar claims the summit, and in time a new cub is raised high—the circle beginning again."},
"Hamlet":{
ja:"デンマークの王が急死し、王弟クローディアスが王冠と王妃ガートルードを引き継いだ。喪も明けぬ婚礼に鬱屈する王子ハムレットの前に、夜ごと城壁に現れるという父の亡霊が立つ。「私は昼寝の最中、弟に耳から毒を注がれた。復讐せよ」。ハムレットは狂気を装って好機を探るが、確信が持てない。恋人オフィーリアを「尼寺へ行け」と突き放し、旅役者に王殺しの芝居を演じさせて、青ざめて席を立つクローディアスの反応に真実を掴む。だが祈る王を前に剣を収め（祈りの最中に殺せば天国へ送ってしまう）、母の寝室では帷の陰の人影を王と誤認して刺す——倒れたのはオフィーリアの父ポローニアスだった。ハムレットは英国へ追放され、道中の計略で処刑状を書き換えて生還する。その間にオフィーリアは狂い、川で花に囲まれて溺れ死に、兄レアティーズは復讐を誓ってクローディアスと結託する。毒を塗った剣と毒杯を仕込んだ御前試合。ガートルードは誤って毒杯を呷り、ハムレットとレアティーズは互いに毒剣で傷つけ合い、死の間際にレアティーズがすべてを暴露する。ハムレットは毒剣でクローディアスを刺し、毒杯を飲ませて父の仇を討ち、親友ホレイショーに「この物語を語り伝えよ」と遺して息絶える。「あとは、沈黙」。弔砲が轟き、四つの亡骸が舞台に横たわる。",
en:"Denmark's king is dead, and his brother Claudius has taken both crown and queen. To the grieving Prince Hamlet comes his father's ghost with a command: I was murdered—poison poured in my ear as I slept—avenge me. Feigning madness to probe the truth, Hamlet spurns his love Ophelia ('get thee to a nunnery') and stages a play that mirrors the murder; when Claudius bolts from the performance, the ghost is proven honest. Yet Hamlet spares the king at prayer—killing him shriven would send him heavenward—and in his mother's chamber stabs a figure behind the arras: not Claudius but Polonius, Ophelia's father. Shipped to England with a sealed death warrant, Hamlet rewrites it against its bearers and returns—to find Ophelia drowned amid her flowers, mad with grief, and her brother Laertes sworn to Claudius's plot: a fencing match with a poisoned blade and a poisoned cup in reserve. Gertrude drinks the cup in toast; Hamlet and Laertes wound each other with the envenomed point; dying, Laertes confesses all. Hamlet drives the blade into Claudius, forces the dregs down his throat, and, bidding Horatio live to tell his story, breathes his last: the rest is silence. Cannon sound as four bodies lie upon the stage."}
};

/* ---------- state ---------- */
let LANG='ja', GENRE='ALL', CUR=null;
const store={get(k){try{return localStorage.getItem(k)}catch(e){return null}},
 set(k,v){try{localStorage.setItem(k,v)}catch(e){}}};
const curYM=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')};
const isMember=()=>{const v=store.get('meien_member');return v==='master'||v===curYM()};
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
const readSet=()=>{try{return new Set(JSON.parse(store.get('meien_read')||'[]'))}catch(e){return new Set()}};
const saveRead=s=>store.set('meien_read',JSON.stringify([...s]));
const aiShelf=()=>{try{return JSON.parse(store.get('meien_ai')||'[]')}catch(e){return[]}};
const saveShelf=a=>store.set('meien_ai',JSON.stringify(a));

/* ---------- i18n ---------- */
function setLang(l){LANG=l;store.set('meien_lang',l);
  document.getElementById('btnJa').classList.toggle('on',l==='ja');
  document.getElementById('btnEn').classList.toggle('on',l==='en');
  document.documentElement.lang=l;applyText();render();renderShelf();renderSaved();
  if(LAST_RANK)renderRank(LAST_RANK.counts,LAST_RANK.isLocal);}
function applyText(){const t=T[LANG];
  document.getElementById('brandTitle').textContent=LANG==='ja'?'名演手帖':'LUMINARE';
  document.getElementById('brandSub').textContent=LANG==='ja'
    ?'LUMINARE · THE ART OF PERFORMANCE':'名演手帖 · THE ART OF PERFORMANCE';
  document.title=LANG==='ja'
    ?'名演手帖 | LUMINARE — 時代を彩る名作と名演を、三分で。'
    :'LUMINARE | 名演手帖 — The classics of stage and screen, in three minutes.';
  document.getElementById('tagline').textContent=t.tagline;
  document.getElementById('shelfLabel').textContent=t.shelf;
  document.getElementById('q').placeholder=t.search;
  document.getElementById('aiTitle').textContent=t.aiTitle;
  document.getElementById('aiDesc').textContent=t.aiDesc;
  document.getElementById('aiBook').placeholder=t.aiPhBook;
  document.getElementById('aiAuthor').placeholder=t.aiPhAuthor;
  document.getElementById('aiBtn').textContent=t.aiBtn;
  document.getElementById('savedH').textContent=t.savedH;
  document.getElementById('payTitle').textContent=t.payTitle;
  document.getElementById('payCopy').innerHTML=t.payCopy(BOOKS.length);
  document.getElementById('payUnlock').textContent=t.unlock;
  document.getElementById('payBuy').textContent=t.buy;
  document.getElementById('payNote').textContent=t.payNote;
  document.getElementById('footNote').textContent=t.foot;
  document.getElementById('mClose').textContent=t.close;
  document.getElementById('stripCr').textContent=t.stripCr;
  const ml=document.getElementById('memberLine');
  ml.classList.toggle('is-member',isMember());
  document.getElementById('memberText').textContent=isMember()?t.member:t.free;}

/* ---------- strip ---------- */
function renderStrip(){const order=['bw','red','dark','gold','pair'];
  document.getElementById('stripRow').innerHTML=order.map(k=>STRIP[k]?`<img src="${STRIP[k]}" alt="">`:'').join('');}

/* ---------- genre shelf ---------- */
function genres(){const seen=new Map();
  BOOKS.forEach(b=>{if(!seen.has(b.g.en))seen.set(b.g.en,b.g)});return[...seen.values()];}
function renderShelf(){const sh=document.getElementById('shelf');const t=T[LANG];
  let h=`<button class="tag-btn ${GENRE==='ALL'?'on':''}" onclick="setGenre('ALL')">${t.all}</button>`;
  genres().forEach(g=>{h+=`<button class="tag-btn ${GENRE===g.en?'on':''}" onclick="setGenre('${g.en}')">${g[LANG]}</button>`});
  sh.innerHTML=h;}
function setGenre(g){GENRE=g;
  if(g==='ALL')document.getElementById('q').value='';
  renderShelf();render();}
function clearSearch(){document.getElementById('q').value='';render();}

/* ---------- ranking（Worker共用・自演目のみ表示） ---------- */
const bookId=b=>b.t.en;
let LAST_RANK=null;
function localViews(){try{return JSON.parse(store.get('meien_views')||'{}')}catch(e){return{}}}
function recordView(b){
  const v=localViews();const id=bookId(b);v[id]=(v[id]||0)+1;store.set('meien_views',JSON.stringify(v));
  if(CONFIG.RANKING_URL){
    fetch(CONFIG.RANKING_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id})}).then(()=>loadRanking()).catch(()=>{});
  }else{renderRank(v,true);}
}
async function loadRanking(){
  if(CONFIG.RANKING_URL){
    try{const r=await fetch(CONFIG.RANKING_URL);if(r.ok){renderRank(await r.json(),false);return}}catch(e){}
  }
  renderRank(localViews(),true);
}
function renderRank(counts,isLocal){
  LAST_RANK={counts,isLocal};const t=T[LANG];
  const arr=BOOKS.map((b,i)=>({b,i,c:counts[bookId(b)]||0}))
    .filter(x=>x.c>0).sort((a,z)=>z.c-a.c).slice(0,5);
  const box=document.getElementById('rankBox');
  if(!arr.length){box.style.display='none';return}
  box.style.display='';
  document.getElementById('rankH').textContent=t.rank;
  document.getElementById('rankList').innerHTML=arr.map((x,n)=>{
    const locked=!isMember()&&x.i>=CONFIG.FREE_COUNT;
    return `<div class="rank-item" onclick="${locked?'openPay()':`openBook(${x.i})`}">
      <div class="rank-no">${n+1}</div><div class="ttl">${x.b.t[LANG]}</div>
      <div class="vc">${x.c} ${t.views}${locked?' 🔒':''}</div></div>`}).join('')
    +`<div class="rank-note">${isLocal?t.rankLocal:t.rankGlobal}</div>`;
}

/* ---------- library ---------- */
function render(){const t=T[LANG];const q=(document.getElementById('q').value||'').toLowerCase();
  document.getElementById('clearQ').classList.toggle('show',q.length>0);
  const rs=readSet();let shown=0,h='';
  BOOKS.forEach((b,i)=>{
    if(GENRE!=='ALL'&&b.g.en!==GENRE)return;
    const hay=(b.t.ja+b.t.en+b.a.ja+b.a.en).toLowerCase();
    if(q&&!hay.includes(q))return;
    shown++;
    const locked=!isMember()&&i>=CONFIG.FREE_COUNT;
    const badge=locked?`<div class="lockbadge">${t.locked}</div>`
      :(rs.has(i)?`<div class="read-mark">${t.read}</div>`:'');
    h+=`<div class="film" onclick="${locked?'openPay()':`openBook(${i})`}">
      <div class="band" style="background:${b.col}"></div>
      <div class="bd"><h3>${b.t[LANG]}</h3>
      <div class="meta">${b.a[LANG]} · ${b.c[LANG]} · ${b.y}</div>
      <div class="tags"><span class="tag genre">${b.g[LANG]}</span><span class="tag">${LANG==='ja'?'約3分':'~3 min'}</span></div>
      </div>${badge}</div>`;});
  document.getElementById('list').innerHTML=h;
  document.getElementById('count').textContent=t.count(shown);}

let CUR_DETAIL=null;
function setDetail(d){const t=T[LANG];CUR_DETAIL=d;
  const btn=document.getElementById('mDetailBtn'),body=document.getElementById('mDetail');
  body.style.display='none';
  if(d&&d[LANG]){btn.style.display='';btn.textContent=t.detailBtn;
    body.innerHTML=`<div class="d-label">${t.detailLabel}</div>`;
    body.appendChild(document.createTextNode(d[LANG]));}
  else{btn.style.display='none';}}
function toggleDetail(){const t=T[LANG];
  const btn=document.getElementById('mDetailBtn'),body=document.getElementById('mDetail');
  const open=body.style.display==='none';
  body.style.display=open?'':'none';
  btn.textContent=open?t.detailHide:t.detailBtn;}

function openBook(i){CUR=i;const b=BOOKS[i];const t=T[LANG];
  recordView(b);
  setDetail(DETAILS[b.t.en]||null);
  document.getElementById('mEyebrow').textContent=`${b.c[LANG].toUpperCase()} · ${b.y}`;
  document.getElementById('mTitle').textContent=b.t[LANG];
  document.getElementById('mSub').textContent=`${b.a[LANG]}／${LANG==='ja'?b.t.en:b.t.ja}`;
  document.getElementById('mSummary').textContent=b.s[LANG];
  document.getElementById('mThemes').textContent=b.th[LANG]?`${t.themesLabel}：${b.th[LANG]}`:'';
  const rb=document.getElementById('mReadBtn');rb.style.display='';rb.onclick=toggleRead;
  rb.textContent=readSet().has(i)?t.unmark:t.markRead;
  document.getElementById('bookOverlay').classList.add('show');}
function toggleRead(){if(CUR===null)return;const rs=readSet();
  rs.has(CUR)?rs.delete(CUR):rs.add(CUR);saveRead(rs);
  document.getElementById('mReadBtn').textContent=rs.has(CUR)?T[LANG].unmark:T[LANG].markRead;render();}
function closeBook(){document.getElementById('bookOverlay').classList.remove('show');CUR=null;}

/* ---------- paywall ---------- */
function openPay(){document.getElementById('payErr').textContent='';
  document.getElementById('payOverlay').classList.add('show');}
function closePay(){document.getElementById('payOverlay').classList.remove('show');}
async function checkPass(){const v=(document.getElementById('passInput').value||'').normalize('NFKC').replace(/[\u2010-\u2015\u2212\u30FC\uFF0D\uFF70]/g,'-').replace(/\s+/g,'').toUpperCase();
  if(!v)return;
  if(v===CONFIG.MASTER_PASSCODE.toUpperCase()){grantMember('master');return;}
  const hash=CONFIG.MONTHLY_CODES[curYM()];
  if(hash){try{
    if((await sha256(v))===hash){grantMember(curYM());return;}
  }catch(e){console.error(e);}}
  document.getElementById('payErr').textContent=T[LANG].wrong;}
function grantMember(val){store.set('meien_member',val);closePay();applyText();render();
  document.getElementById('aiStatus').textContent=T[LANG].welcome;}

/* ---------- AI支配人 ---------- */
async function aiSummarize(){const t=T[LANG];
  if(!isMember()){openPay();return;}
  const title=(document.getElementById('aiBook').value||'').trim();
  const author=(document.getElementById('aiAuthor').value||'').trim();
  const st=document.getElementById('aiStatus');const btn=document.getElementById('aiBtn');
  if(!title){st.textContent=t.aiNeedTitle;return;}
  st.textContent=t.aiWorking;btn.disabled=true;
  const prompt=`You are a film and theatre concierge. Write ORIGINAL summaries of the film, musical or play "${title}"${author?` by ${author}`:''}.
Rules: write entirely in your own words, do NOT quote dialogue, lyrics or any text from the work. summary_ja: 140-200 characters, elegant tone. summary_en: 60-90 words. story_ja: 300-420 characters, the full plot INCLUDING the ending. story_en: 130-180 words, the full plot including the ending.
Respond ONLY with valid JSON, no markdown fences, exactly this shape:
{"title_ja":"","title_en":"","author_ja":"","author_en":"","country_ja":"","country_en":"","year":0,"genre_ja":"","genre_en":"","summary_ja":"","summary_en":"","themes_ja":"","themes_en":"","story_ja":"","story_en":""}
If the work cannot be identified, set every field to "" and year to 0.`;
  try{
    const res=await fetch(CONFIG.PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:CONFIG.MODEL,max_tokens:1400,messages:[{role:"user",content:prompt}]})});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    const text=(data.content||[]).map(x=>x.text||'').join('').replace(/```json|```/g,'').trim();
    const j=JSON.parse(text);
    if(!j.title_ja&&!j.title_en)throw new Error("not found");
    const entry={t:{ja:j.title_ja||title,en:j.title_en||title},a:{ja:j.author_ja||author,en:j.author_en||author},
      c:{ja:j.country_ja||'',en:j.country_en||''},y:j.year||'',g:{ja:j.genre_ja||'',en:j.genre_en||''},
      s:{ja:j.summary_ja||'',en:j.summary_en||''},th:{ja:j.themes_ja||'',en:j.themes_en||''},
      d:(j.story_ja||j.story_en)?{ja:j.story_ja||'',en:j.story_en||''}:null,
      col:'#'+['8E2A36','3E6B8C','8C6E3E','5C5470','4E6B4A'][Math.floor(Math.random()*5)],ts:Date.now()};
    const shelf=aiShelf();shelf.unshift(entry);saveShelf(shelf);
    st.textContent=t.aiDone;document.getElementById('aiBook').value='';document.getElementById('aiAuthor').value='';
    renderSaved();
  }catch(e){console.error(e);st.textContent=t.aiErr;}
  btn.disabled=false;}

function renderSaved(){const t=T[LANG];const shelf=aiShelf();const el=document.getElementById('savedList');
  if(!shelf.length){el.innerHTML=`<div class="empty">${t.savedEmpty}</div>`;return;}
  el.innerHTML=shelf.map((b,i)=>`<div class="film" onclick="openSaved(${i})">
    <div class="band" style="background:${b.col}"></div>
    <div class="bd"><h3>${b.t[LANG]||b.t.ja||b.t.en}</h3>
    <div class="meta">${b.a[LANG]||''}${b.c[LANG]?' · '+b.c[LANG]:''}${b.y?' · '+b.y:''}</div>
    <div class="tags"><span class="tag genre">${t.aiTag}</span>${b.g[LANG]?`<span class="tag">${b.g[LANG]}</span>`:''}</div>
    </div></div>`).join('');}
function openSaved(i){const b=aiShelf()[i];if(!b)return;const t=T[LANG];CUR=null;
  setDetail(b.d||null);
  document.getElementById('mEyebrow').textContent=`${t.aiTag} · ${b.c[LANG]||''} ${b.y||''}`;
  document.getElementById('mTitle').textContent=b.t[LANG]||b.t.ja||b.t.en;
  document.getElementById('mSub').textContent=`${b.a[LANG]||''}／${LANG==='ja'?(b.t.en||''):(b.t.ja||'')}`;
  document.getElementById('mSummary').textContent=b.s[LANG]||'';
  document.getElementById('mThemes').textContent=b.th[LANG]?`${t.themesLabel}：${b.th[LANG]}`:'';
  const rb=document.getElementById('mReadBtn');rb.style.display='';rb.textContent=t.del;
  rb.onclick=()=>{const s=aiShelf();s.splice(i,1);saveShelf(s);closeBook();renderSaved();rb.onclick=toggleRead;};
  document.getElementById('bookOverlay').classList.add('show');}

let TOAST_T=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;
  el.classList.add('show');clearTimeout(TOAST_T);
  TOAST_T=setTimeout(()=>el.classList.remove('show'),2600);}
