<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | 吉田獅玄</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #1A252F;
            --navy-light: #2C3E50;
            --gold: #C8813A;
            --white: #ffffff;
            --off-white: #F7F6F3;
            --text: #333333;
            --text-light: #888888;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--off-white);
            color: var(--text);
            line-height: 1.8;
        }

        /* ── Header ── */
        header {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(26,37,47,0.96);
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 32px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--white);
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        nav a {
            color: rgba(255,255,255,0.75);
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 0;
            width: 0; height: 1px;
            background-color: var(--gold);
            transition: width 0.3s;
        }

        nav a:hover { color: var(--white); }
        nav a:hover::after { width: 100%; }

        nav a.nav-works { color: var(--gold); }
        nav a.nav-works:hover { color: #e09a50; }

        nav a.nav-active {
            color: var(--white);
        }
        nav a.nav-active::after {
            width: 100%;
        }

        /* ── Page Hero ── */
        .page-hero {
            height: 320px;
            position: relative;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .page-hero-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1588668214407-6ea9a6d8c272?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center 30%;
            animation: slowZoom 25s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to   { transform: scale(1.06); }
        }

        .page-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(26,37,47,0.75) 0%, rgba(44,62,80,0.35) 100%);
        }

        .page-hero-content {
            position: relative;
            z-index: 2;
            color: var(--white);
            padding: 0 0 56px 0;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding-left: 32px;
            padding-bottom: 56px;
        }

        .page-hero-eyebrow {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.55;
            margin-bottom: 10px;
        }

        .page-hero-content h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            font-weight: 300;
            letter-spacing: 3px;
        }

        /* ── Profile Section ── */
        #profile {
            padding: 100px 0 120px;
            background-color: var(--white);
        }

        .container {
            max-width: 1040px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 80px;
            align-items: start;
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .profile-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Image column ── */
        .profile-img-wrap {
            position: relative;
        }

        .profile-img-wrap::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px;
            right: 12px; bottom: 12px;
            border: 1px solid var(--gold);
            opacity: 0.3;
            border-radius: 4px;
        }

        .profile-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: contain;
            object-position: top center;
            border-radius: 4px;
            background-color: var(--off-white);
            display: block;
        }

        .profile-name-sub {
            margin-top: 24px;
            text-align: center;
        }

        .profile-name-sub .name-ja {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: 2px;
        }

        .profile-name-sub .name-en {
            font-size: 0.78rem;
            color: var(--text-light);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── Text column ── */
        .section-label {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .profile-text h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            color: var(--navy);
            margin-bottom: 32px;
            line-height: 1.3;
        }

        .profile-text p {
            font-size: 0.95rem;
            color: var(--text);
            opacity: 0.75;
            font-weight: 300;
            margin-bottom: 16px;
            line-height: 2.1;
        }

        .divider-gold {
            width: 36px;
            height: 1px;
            background-color: var(--gold);
            margin: 36px 0;
            opacity: 0.5;
        }

        .profile-sns {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--white);
            background-color: #1877F2;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: background-color 0.3s, transform 0.3s;
        }

        .profile-sns:hover {
            background-color: #1558b0;
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--navy);
            border-bottom: 1px solid var(--navy);
            padding-bottom: 2px;
            transition: color 0.3s, border-color 0.3s;
            margin-bottom: 32px;
        }

        .back-link:hover {
            color: var(--gold);
            border-color: var(--gold);
        }

        /* ── Footer ── */
        footer {
            background-color: #0f1a22;
            color: rgba(255,255,255,0.3);
            text-align: center;
            padding: 32px;
            font-size: 0.78rem;
            letter-spacing: 1px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header-inner { padding: 0 20px; }
            nav ul { gap: 20px; }
            .page-hero { height: 240px; }
            .page-hero-content { padding-left: 20px; padding-bottom: 36px; }
            .page-hero-content h1 { font-size: 2rem; }
            .profile-grid {
                grid-template-columns: 1fr;
                gap: 48px;
            }
            .profile-img-wrap { max-width: 240px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <!-- ── Header ── -->
    <header>
        <div class="header-inner">
            <a href="../" class="logo">Shigen Yoshida</a>
            <nav>
                <ul>
                    <li><a href="../#about">About</a></li>
                    <li><a href="../works/" class="nav-works">Works</a></li>
                    <li><a href="../#contact">Contact</a></li>
                    <li><a href="./" class="nav-active">Profile</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ── Page Hero ── -->
    <div class="page-hero" style="padding-top: 72px;">
        <div class="page-hero-bg"></div>
        <div class="page-hero-overlay"></div>
        <div class="page-hero-content">
            <p class="page-hero-eyebrow">About me</p>
            <h1>Profile</h1>
        </div>
    </div>

    <!-- ── Profile Content ── -->
    <section id="profile">
        <div class="container">
            <div class="profile-grid fade-in">

                <!-- 左：画像 -->
                <div class="profile-img-wrap">
                    <img src="../images/profile.jpg"
                         alt="吉田獅玄"
                         class="profile-img"
                         onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Shigen&backgroundColor=f7f6f3&style=circle&top=shortHair&clothing=blazerAndShirt&facialHairProbability=0'">
                    <div class="profile-name-sub">
                        <p class="name-ja">吉田 獅玄</p>
                        <p class="name-en">Shigen Yoshida</p>
                    </div>
                </div>

                <!-- 右：テキスト -->
                <div class="profile-text">
                    <a href="../" class="back-link">
                        <i class="fas fa-arrow-left"></i> トップに戻る
                    </a>
                    <p class="section-label">Profile</p>
                    <h2>製造業の現場知識と<br>AIを融合した仕事</h2>
                    <p>製造メーカーでの経験を軸に、今はAIを活用して仕事をしています。</p>
                    <p>レポート・資料・リサーチ・デザイン――クライアントの課題に、最後まで丁寧に向き合う仕事をします。</p>
                    <div class="divider-gold"></div>
                    <a href="https://www.facebook.com/profile.php?id=61558753410397"
                       target="_blank" rel="noopener noreferrer"
                       class="profile-sns">
                        <i class="fab fa-facebook-f"></i> Facebookでつながる
                    </a>
                </div>

            </div>
        </div>
    </section>

    <!-- ── Footer ── */-->
    <footer>
        <p>&copy; 2026 Shigen Yoshida. All Rights Reserved.</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    observer.unobserve(e.target);
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>

</body>
</html>
