<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2b2622">
  <title>叡智の灯火 — 人生の岐路と、偉人たちの言葉</title>
  <meta name="description" content="人生の悩みに、世界の偉人が言葉を贈る人生シミュレーション。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" aria-live="polite"></main>
  <!-- データは JSON(data/sages.json, data/events.json) が正典。gamedata.js は build-data.py で生成 -->
  <script src="data/gamedata.js"></script>
  <script src="game.js"></script>

<!-- 訪問カウンター：ページ読込ごとに +1／?admin 付きURLで数値バッジ表示（counterapi.dev） -->
<script id="eichi-counter" data-ns="jinsei-game">
(function(){
  var NS='jinsei-game';
  fetch('https://api.counterapi.dev/v1/dashiyo777oss/'+NS+'/up')
    .then(function(r){return r.json();})
    .then(function(d){
      if(location.search.indexOf('admin')===-1) return;
      var b=document.createElement('div');
      b.textContent='\uD83D\uDC41 '+NS+': '+((d&&d.count!=null)?Number(d.count).toLocaleString():'---');
      b.style.cssText='position:fixed;bottom:16px;right:16px;background:rgba(26,37,47,.92);color:#fff;padding:10px 14px;border-radius:10px;font:13px/1.2 sans-serif;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.3)';
      document.body.appendChild(b);
    })
    .catch(function(){});
})();
</script>
</body>
</html>
