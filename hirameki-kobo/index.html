<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひらめき工房</title>
<meta name="theme-color" content="#EEF1F2">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='28' fill='none' stroke='%23B3311D' stroke-width='5'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle' fill='%23B3311D' font-family='serif' font-weight='bold'%3E思%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EEF1F2;
  --grid:rgba(90,130,150,.14);
  --ink:#1C2B36;
  --ink-soft:#4A5C68;
  --hanko:#B3311D;
  --brass:#8C7A3F;
  --card:#FBFBF8;
  --line:#C6CFD3;
  --ok:#2E6B4F;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Zen Kaku Gothic New',system-ui,sans-serif;
  color:var(--ink);
  background:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:22px 22px;
  min-height:100vh;
  padding:16px 14px 90px;
  max-width:560px;margin:0 auto;
}
h1{
  font-family:'Shippori Mincho',serif;font-weight:800;
  font-size:26px;letter-spacing:.12em;
  display:flex;align-items:baseline;gap:10px;
}
h1 small{font-size:11px;letter-spacing:.2em;color:var(--ink-soft);font-family:'Zen Kaku Gothic New',sans-serif;font-weight:500}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tagline{font-size:11.5px;color:var(--ink-soft);margin:2px 0 16px;letter-spacing:.05em}

/* 工程スタンプ */
.stamps{display:flex;gap:6px;align-items:center}
.stamp{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-weight:800;font-size:15px;
  color:var(--line);background:transparent;flex-shrink:0;
  transition:all .25s;
}
.stamp.on{
  border-color:var(--hanko);color:var(--hanko);
  background:rgba(179,49,29,.06);
  transform:rotate(-6deg);
  box-shadow:0 0 0 1px rgba(179,49,29,.15);
}
.stamp-link{height:2px;flex:1;background:var(--line);min-width:4px}
.stamp-link.on{background:var(--hanko)}
.stamps.big .stamp{width:48px;height:48px;font-size:21px;cursor:pointer}
.stage-label{font-size:10px;text-align:center;color:var(--ink-soft);margin-top:4px;letter-spacing:.05em}

/* カード */
.card{
  background:var(--card);border:1px solid var(--line);
  border-radius:10px;padding:14px 15px;margin-bottom:12px;
  box-shadow:2px 3px 0 rgba(28,43,54,.06);
}
.card.idea{cursor:pointer;transition:transform .15s}
.card.idea:active{transform:scale(.985)}
.card.idea h3{font-size:16px;font-weight:700;margin-bottom:8px}
.card.idea .memo{font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.route-tag{
  display:inline-block;font-size:10.5px;font-weight:700;
  border:1px solid var(--brass);color:var(--brass);
  border-radius:3px;padding:1px 7px;margin-bottom:8px;letter-spacing:.08em;
}

/* ボタン */
.btn{
  display:block;width:100%;border:none;border-radius:8px;
  padding:13px;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;letter-spacing:.08em;
}
.btn-primary{background:var(--hanko);color:#fff;box-shadow:2px 3px 0 rgba(28,43,54,.15)}
.btn-primary:active{transform:translateY(2px);box-shadow:none}
.btn-primary:disabled{background:#B9AFA9;box-shadow:none}
.btn-ghost{background:transparent;border:1.5px dashed var(--ink-soft);color:var(--ink-soft);font-size:13px;padding:10px}
.btn-danger{background:transparent;color:var(--hanko);border:1px solid var(--hanko);font-size:12px;padding:8px}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-row .btn{flex:1}

/* 入力 */
input[type=text],textarea{
  width:100%;border:1px solid var(--line);border-radius:8px;
  padding:11px 12px;font-size:15px;font-family:inherit;background:#fff;
  color:var(--ink);
}
input:focus,textarea:focus{outline:2px solid var(--brass);outline-offset:1px}
textarea{min-height:96px;resize:vertical;line-height:1.6}
label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin:12px 0 5px;letter-spacing:.1em}

/* 詳細画面セクション */
.sec-title{
  font-family:'Shippori Mincho',serif;font-weight:800;font-size:15px;
  border-left:4px solid var(--hanko);padding-left:8px;
  margin:20px 0 8px;letter-spacing:.1em;
}
.sec-body{font-size:13.5px;line-height:1.75;color:var(--ink)}
.sec-body ul{padding-left:18px}
.sec-body li{margin-bottom:5px}
.right-item{border-bottom:1px dashed var(--line);padding:7px 0;font-size:13.5px}
.right-item b{color:var(--brass)}

/* チェックリスト */
.chk{
  display:flex;gap:10px;align-items:flex-start;
  padding:9px 0;border-bottom:1px dashed var(--line);cursor:pointer;
}
.chk:last-child{border-bottom:none}
.chk .box{
  width:20px;height:20px;border:2px solid var(--ink-soft);border-radius:4px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#fff;margin-top:1px;
}
.chk.done .box{background:var(--ok);border-color:var(--ok)}
.chk .txt{font-size:13.5px;line-height:1.55}
.chk.done .txt{text-decoration:line-through;color:var(--ink-soft)}
.chk .stg{
  font-family:'Shippori Mincho',serif;font-weight:800;font-size:12px;
  color:var(--hanko);flex-shrink:0;width:18px;text-align:center;margin-top:2px;
}

/* ローディング */
.loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:26px 0}
.gear{
  width:44px;height:44px;border-radius:50%;
  border:4px solid var(--line);border-top-color:var(--hanko);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:12.5px;color:var(--ink-soft);letter-spacing:.08em}

.empty{
  text-align:center;padding:48px 20px;color:var(--ink-soft);
  font-size:13.5px;line-height:2;
}
.empty .big{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:800;color:var(--ink);letter-spacing:.15em}
.back{
  background:none;border:none;font-family:inherit;color:var(--ink-soft);
  font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:10px;letter-spacing:.05em;
}
.err{background:#FBEAE7;border:1px solid var(--hanko);color:var(--hanko);border-radius:8px;padding:10px 12px;font-size:12.5px;margin:10px 0;line-height:1.6}
.note{font-size:11px;color:var(--ink-soft);line-height:1.7;margin-top:6px}
.qa-box{margin-top:10px}
.qa-answer{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:13.5px;line-height:1.8;margin-top:10px;white-space:pre-wrap}
.qa-item{border:1px solid var(--line);border-radius:8px;background:#fff;margin-top:10px;overflow:hidden}
.qa-item .q{background:rgba(140,122,63,.10);padding:9px 12px;font-size:13px;font-weight:700;border-bottom:1px dashed var(--line)}
.qa-item .q .when{font-weight:400;font-size:10.5px;color:var(--ink-soft);float:right;margin-left:8px}
.qa-item .a{padding:11px 12px;font-size:13.5px;line-height:1.8;white-space:pre-wrap}
.svg-wrap{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px;margin-top:4px;overflow-x:auto}
.svg-wrap svg{width:100%;height:auto;display:block}
table.bom{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
table.bom th{background:rgba(140,122,63,.12);color:var(--ink);font-weight:700;padding:6px 7px;border:1px solid var(--line);text-align:left;letter-spacing:.05em}
table.bom td{padding:6px 7px;border:1px solid var(--line);background:#fff}
table.bom td.num{text-align:right;font-variant-numeric:tabular-nums}
table.bom tr.total td{font-weight:700;background:rgba(179,49,29,.06)}
/* 一覧の進捗バー */
.pbar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:8px}
.pbar>div{height:100%;background:var(--ok);border-radius:3px;transition:width .3s}

/* 完了案件の「成」判 */
.card.idea{position:relative;overflow:hidden}
.sei{
  position:absolute;top:8px;right:10px;
  width:44px;height:44px;border:2.5px solid var(--hanko);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-weight:800;font-size:22px;
  color:var(--hanko);transform:rotate(-12deg);opacity:.85;
  background:rgba(179,49,29,.05);pointer-events:none;
}

/* 並び替えチップ */
.chips{display:flex;gap:8px;margin-bottom:12px}
.chip{
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
  border-radius:999px;padding:5px 14px;font-size:12px;font-family:inherit;
  cursor:pointer;letter-spacing:.05em;
}
.chip.on{border-color:var(--hanko);color:var(--hanko);font-weight:700;background:rgba(179,49,29,.06)}

/* ヘッダーの小ボタン */
.hbtn{
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
  border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;
  cursor:pointer;letter-spacing:.05em;flex-shrink:0;
}
.tools{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

/* 図面拡大モーダル */
.modal{
  position:fixed;inset:0;background:rgba(28,43,54,.9);z-index:50;
  display:flex;flex-direction:column;padding:12px;
}
.modal .pane{
  flex:1;background:#fff;border-radius:10px;overflow:auto;
  -webkit-overflow-scrolling:touch;padding:10px;
}
.modal .pane svg{width:200%;max-width:none;height:auto;display:block}
.modal .close{
  margin-top:10px;background:var(--card);border:none;border-radius:8px;
  padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--ink);
}
.modal .hint{color:#fff;font-size:11.5px;text-align:center;margin-bottom:8px;letter-spacing:.05em}

@media (prefers-reduced-motion: reduce){.gear{animation:none}.stamp{transition:none}.pbar>div{transition:none}}
</style>
</head>
<body>
<div id="app"></div>

<script>
const STAGES = ["思","形","権","宣","売","金"];
const STAGE_NAMES = {"思":"着想","形":"試作","権":"権利","宣":"宣伝","売":"販売","金":"入金"};
const STORE_KEY = "hirameki-ideas";

/* ---------- 設定（デプロイ後にここだけ書き換える） ---------- */
// Cloudflare Worker のエンドポイント。デプロイして得たURLに差し替える。
// 例: "https://hirameki-proxy.dashiyo777.workers.dev"
const AI_ENDPOINT = "https://hirameki-proxy.dashiyo777.workers.dev";
// 使用モデル（Worker がそのまま Anthropic に転送する）
const AI_MODEL = "claude-sonnet-4-6";

let ideas = [];
let view = "list";        // list | new | edit | detail | backup
let currentId = null;
let sortMode = "new";     // new(新着順) | stage(工程順)
let askDraft = "";        // 相談欄の下書き（失敗時に復元）
let backupMsg = "";
let analyzing = false;
let designing = false;
let drawing = false;
let costing = false;
let asking = false;
let lastError = "";

/* ---------- 保存・読込（localStorage。同一端末内に保存） ---------- */
async function loadIdeas(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    ideas = raw ? JSON.parse(raw) : [];
  }catch(e){ ideas = []; }
}
async function saveIdeas(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(ideas)); }
  catch(e){ lastError = "保存に失敗しました。端末の空き容量やプライベートブラウズ設定を確認して、もう一度操作してください。"; render(); }
}

/* ---------- AI 呼び出し ---------- */
async function analyzeIdea(idea){
  const sys = `あなたは個人クリエイターの事業化支援の専門家です。日本の制度・市場を前提に回答します。
相談者の背景: 元生産技術エンジニア。個人で活動。スマホのみで作業し、コーディングはAI(Claude Code)に任せる。既にCloudflare Workers + Anthropic APIのアプリ運営、note有料メンバーシップでの課金、TuneCore/JASRACでの音楽配信の経験がある。
アイデアを受け取り、必ず次のJSONのみを出力すること。前置き・後書き・マークダウン記法は一切禁止。
{"concept":"一言コンセプト(30字以内)","route":"アプリ|物販(雑貨・100均系)|コンテンツ|サービス のいずれか","routeReason":"判定理由(60字以内)","rights":[{"type":"商標/意匠/実用新案/特許/著作権のいずれか","note":"この案件での要点(50字以内)"}],"promoFirst":["最初の宣伝方法。費用ゼロ〜少額で発売初週にできる具体策(各45字以内)を2-3個"],"promoGrowth":["軌道に乗せる拡販ステップ。順番に実行する具体策(各45字以内)を2-3個"],"channels":["販売チャネル案(各40字以内)を2-4個"],"payment":["入金までの仕組み(各40字以内)を2-3個"],"steps":[{"stage":"形/権/宣/売/金のいずれか","text":"具体的な作業(35字以内)"}],"cautions":["注意点(各45字以内)を2-3個"]}
stepsは工程順に6〜8個で、宣(宣伝)の工程を必ず1個以上含める。promoFirst/promoGrowth/payment/cautionsは各2個、channelsは2〜3個。権利は関係が薄いものは含めない。宣伝は相談者の既存資産(note、YouTube、X、eichinohi.comサイト、メルマガ)の活用を優先しつつ、その商材に合う媒体(SNS、ハンドメイドマルシェ、プレスリリース等)も提案する。実在の制度・サービス名を使い、抽象論を避けること。JSONは改行や余分な空白を入れず1行で出力すること。`;
  const user = `アイデア名: ${idea.title}\nメモ: ${idea.memo || "(詳細メモなし)"}`;
  const res = await fetch(AI_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:AI_MODEL,
      max_tokens:2000,
      system:sys,
      messages:[{role:"user",content:user}]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || "APIエラー");
  const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean = text.replace(/```json|```/g,"").trim();
  const first = clean.indexOf("{"), last = clean.lastIndexOf("}");
  const sliced = clean.slice(first, last+1>0?last+1:clean.length);
  try{ return JSON.parse(sliced); }
  catch(e){ return JSON.parse(repairJson(clean.slice(first))); }
}

/* 途中で切れたJSONを閉じて修復する */
function repairJson(s){
  let stack=[], inStr=false, esc=false;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(inStr){
      if(esc){ esc=false; }
      else if(c==="\\"){ esc=true; }
      else if(c==='"'){ inStr=false; }
      continue;
    }
    if(c==='"') inStr=true;
    else if(c==="{"||c==="[") stack.push(c);
    else if(c==="}"||c==="]") stack.pop();
  }
  let t=s;
  if(inStr) t+='"';
  t=t.replace(/,\s*$/,"");
  t=t.replace(/,?\s*"[^"]*"\s*:\s*$/,"");
  t=t.replace(/,\s*$/,"");
  while(stack.length){ const o=stack.pop(); t += (o==="{"?"}":"]"); }
  return t;
}

async function designIdea(idea){
  const sys = `あなたは製品開発とアプリ開発の実務経験が豊富な設計コンサルタント。相手は元生産技術エンジニア(40年)で図面や仕様の読解力は高い。スマホのみで作業し、開発はClaude Codeに任せ、Cloudflare Workers運用・note課金の経験あり。
アイデアと工程表を受け取り、具体的な設計書を必ず次のJSONのみで出力。前置き・マークダウン禁止。JSONは改行なし1行で出力。
{"target":"想定ユーザーと使用場面(45字以内)","requirements":["必須要件(各30字以内)を3-5個"],"spec":[{"item":"仕様項目名(寸法/材料/画面構成/技術構成など)","value":"具体的な内容。数値を入れる(50字以内)"}],"structure":"構造・機構またはシステム構成の説明(130字以内)","proto":["試作の手順(各40字以内)を3-5個。使う道具・サービス名を明記"],"mass":"量産または本開発の方法(70字以内)","cost":"概算原価と想定売価(60字以内)"}
specは4〜6個。物販なら寸法・材料・機構・重量など、アプリなら画面一覧・機能・技術構成・API費用などを入れる。実在の材料名・サービス名・工法を使い、数値を必ず入れること。`;
  const user = `アイデア名: ${idea.title}\nメモ: ${idea.memo || "(なし)"}\nルート: ${idea.plan?idea.plan.route:"未判定"}\nコンセプト: ${idea.plan?idea.plan.concept:""}`;
  const res = await fetch(AI_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:AI_MODEL,
      max_tokens:2000,
      system:sys,
      messages:[{role:"user",content:user}]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || "APIエラー");
  const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean = text.replace(/```json|```/g,"").trim();
  const first = clean.indexOf("{"), last = clean.lastIndexOf("}");
  const sliced = clean.slice(first, last+1>0?last+1:clean.length);
  try{ return JSON.parse(sliced); }
  catch(e){ return JSON.parse(repairJson(clean.slice(first))); }
}

async function drawIdea(idea){
  const sys = `あなたは製品設計の図面担当。アイデアと設計書から概略図面をSVGで描く。
出力は<svg>で始まり</svg>で終わるSVGコードのみ。説明文・マークダウン禁止。改行やインデントを入れず、できる限り短いコードで出力すること。
仕様: viewBox="0 0 700 500"、背景透明。線は#1C2B36、寸法線と引出線は#B3311D、文字はfont-family="sans-serif"で日本語ラベル可。
物販なら正面図と側面図の2面を並べ、主要寸法(mm)を寸法線で入れる。アプリなら主要2画面のワイヤーフレームを並べ、画面名と主要ボタンを描く。
右下に品名と単位(mm)の小さな表題欄を入れる。塗りつぶしは最小限、線画中心。要素数は35個以内に厳守すること。`;
  const user = `品名: ${idea.title}\n設計書: ${JSON.stringify(idea.design)}`;
  const res = await fetch(AI_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:AI_MODEL,
      max_tokens:4000,
      system:sys,
      messages:[{role:"user",content:user}]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || "APIエラー");
  const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const s = text.indexOf("<svg");
  if(s<0) throw new Error("図面データが取得できませんでした");
  let svgText = text.slice(s);
  const end = svgText.lastIndexOf("</svg>");
  if(end>=0){
    svgText = svgText.slice(0, end+6);
  }else{
    // 途中で切れた場合: 最後の完全な要素までを残して閉じる
    const lastGt = svgText.lastIndexOf(">");
    if(lastGt<0) throw new Error("図面データが不完全でした");
    svgText = svgText.slice(0, lastGt+1) + "</svg>";
  }
  return svgText
    .replace(/<script[\s\S]*?<\/script>/gi,"")
    .replace(/<foreignObject[\s\S]*?<\/foreignObject>/gi,"")
    .replace(/\son\w+\s*=\s*"[^"]*"/gi,"")
    .replace(/(href|xlink:href)\s*=\s*"javascript:[^"]*"/gi,"");
}

async function costIdea(idea){
  const sys = `あなたは原価企画の専門家。日本の実勢価格(2026年)で概算見積を出す。
アイデアと設計書から、必ず次のJSONのみを改行なし1行で出力。前置き・マークダウン禁止。
{"bom":[{"item":"部品・費目名(20字以内)","spec":"仕様・調達先(30字以内)","qty":"数量","cost":1個あたり円(数値)}],"tooling":"初期費用の内訳と金額(70字以内。金型/3Dプリント/開発費/出願費など)","unitCost":製品1個の製造原価合計(数値),"price":想定売価(数値),"monthly":"月間販売シナリオと粗利額(70字以内。例:月100個で粗利◯円)","note":"見積の前提条件(50字以内)"}
bomは4〜8行。アプリの場合はbomをAPI費用/サーバー費/決済手数料などの月次費目とし、unitCostは月間運用費、priceは月額または1販売あたり収益として扱う。数値は現実的な概算とすること。`;
  const user = `品名: ${idea.title}\n設計書: ${JSON.stringify(idea.design)}`;
  const res = await fetch(AI_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:AI_MODEL,
      max_tokens:2000,
      system:sys,
      messages:[{role:"user",content:user}]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || "APIエラー");
  const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean = text.replace(/```json|```/g,"").trim();
  const first = clean.indexOf("{"), last = clean.lastIndexOf("}");
  const sliced = clean.slice(first, last+1>0?last+1:clean.length);
  try{ return JSON.parse(sliced); }
  catch(e){ return JSON.parse(repairJson(clean.slice(first))); }
}

async function askFollowUp(idea, question){
  const sys = `あなたは個人クリエイターの事業化支援の専門家。日本の制度前提。相手はスマホのみで作業する元エンジニアで、Cloudflare Workers運用・note課金・TuneCore配信の経験あり。以下のアイデアの文脈で、質問に350字以内・箇条書き中心で具体的に答える。マークダウン記法は使わない。`;
  const recent = (idea.qaLog||[]).slice(0,3).reverse().map(x=>`Q:${x.q}\nA:${x.a}`).join("\n---\n");
  const ctx = `アイデア: ${idea.title}\nメモ: ${idea.memo||""}\n分析結果: ${idea.plan ? JSON.stringify(idea.plan) : "未分析"}\n設計書: ${idea.design ? JSON.stringify(idea.design) : "未作成"}\nコスト見積: ${idea.cost ? JSON.stringify(idea.cost) : "未作成"}\n直近の相談履歴:\n${recent||"(なし)"}\n\n新しい質問: ${question}`;
  const res = await fetch(AI_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:AI_MODEL,
      max_tokens:1000,
      system:sys,
      messages:[{role:"user",content:ctx}]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || "APIエラー");
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}

const app = document.getElementById("app");
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

function stampsHtml(stageIdx, big, clickable){
  let h = `<div class="stamps${big?" big":""}">`;
  STAGES.forEach((s,i)=>{
    const on = i<=stageIdx ? " on":"";
    h += `<div style="display:flex;flex-direction:column;align-items:center">
      <div class="stamp${on}" ${clickable?`onclick="setStage(${i})"`:""} role="${clickable?'button':'img'}" aria-label="${STAGE_NAMES[s]}">${s}</div>
      ${big?`<div class="stage-label">${STAGE_NAMES[s]}</div>`:""}
    </div>`;
    if(i<STAGES.length-1) h += `<div class="stamp-link${i<stageIdx?" on":""}"></div>`;
  });
  return h+`</div>`;
}

/* ---------- 操作 ---------- */
async function addIdea(){
  const t = document.getElementById("f-title").value.trim();
  if(!t){ alert("アイデア名を入れてください"); return; }
  const m = document.getElementById("f-memo").value.trim();
  const it = { id:"i"+Date.now(), title:t, memo:m, stage:0, plan:null, qa:"", created:Date.now() };
  ideas.push(it);
  await saveIdeas();
  currentId = it.id; view="detail"; render();
}
function openIdea(id){ currentId=id; view="detail"; render(); }

async function setStage(i){
  const it = ideas.find(x=>x.id===currentId);
  it.stage = (it.stage===i && i>0) ? i-1 : i;
  await saveIdeas(); render();
}

async function toggleStep(i){
  const it = ideas.find(x=>x.id===currentId);
  it.plan.steps[i].done = !it.plan.steps[i].done;
  await saveIdeas(); render();
}

async function runAnalyze(){
  const it = ideas.find(x=>x.id===currentId);
  analyzing = true; render();
  let plan = null, errMsg = "";
  for(let attempt=1; attempt<=2 && !plan; attempt++){
    try{
      plan = await analyzeIdea(it);
    }catch(e){
      console.error(e);
      errMsg = e.message || String(e);
      if(attempt<2) await new Promise(r=>setTimeout(r,1500));
    }
  }
  if(plan){
    plan.steps = (plan.steps||[]).map(s=>({stage:s.stage||"形", text:s.text, done:false}));
    plan.rights = plan.rights||[]; plan.channels=plan.channels||[];
    plan.payment = plan.payment||[]; plan.cautions=plan.cautions||[];
    plan.promoFirst = plan.promoFirst||[]; plan.promoGrowth = plan.promoGrowth||[];
    it.plan = plan;
    await saveIdeas();
  }else{
    lastError = "工程表の作成に失敗しました（2回試行）。少し待ってからもう一度お試しください。詳細: " + errMsg;
  }
  analyzing = false; render();
}

async function runDesign(){
  const it = ideas.find(x=>x.id===currentId);
  designing = true; render();
  let design = null, errMsg = "";
  for(let attempt=1; attempt<=2 && !design; attempt++){
    try{
      design = await designIdea(it);
    }catch(e){
      console.error(e);
      errMsg = e.message || String(e);
      if(attempt<2) await new Promise(r=>setTimeout(r,1500));
    }
  }
  if(design){
    it.design = design;
    await saveIdeas();
  }else{
    lastError = "設計書の作成に失敗しました（2回試行）。少し待ってからもう一度お試しください。詳細: " + errMsg;
  }
  designing = false; render();
}

async function runDraw(){
  const it = ideas.find(x=>x.id===currentId);
  drawing = true; render();
  let svg = null, errMsg = "";
  for(let attempt=1; attempt<=2 && !svg; attempt++){
    try{ svg = await drawIdea(it); }
    catch(e){ console.error(e); errMsg = e.message||String(e); if(attempt<2) await new Promise(r=>setTimeout(r,1500)); }
  }
  if(svg){ it.svg = svg; await saveIdeas(); }
  else lastError = "図面の作成に失敗しました（2回試行）。もう一度お試しください。詳細: " + errMsg;
  drawing = false; render();
}

async function runCost(){
  const it = ideas.find(x=>x.id===currentId);
  costing = true; render();
  let cost = null, errMsg = "";
  for(let attempt=1; attempt<=2 && !cost; attempt++){
    try{ cost = await costIdea(it); }
    catch(e){ console.error(e); errMsg = e.message||String(e); if(attempt<2) await new Promise(r=>setTimeout(r,1500)); }
  }
  if(cost){ it.cost = cost; await saveIdeas(); }
  else lastError = "見積の作成に失敗しました（2回試行）。もう一度お試しください。詳細: " + errMsg;
  costing = false; render();
}

function qaLogOf(it){
  // 旧版データ(it.qa)があれば履歴形式に移行
  if(!it.qaLog) it.qaLog = [];
  if(it.qa){ it.qaLog.unshift({q:"（旧版での相談）", a:it.qa, t:it.created}); delete it.qa; }
  return it.qaLog;
}
function fmtDate(t){
  const d = new Date(t||Date.now());
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;
}
async function clearQa(){
  if(!confirm("この案件の相談履歴をすべて消します。よろしいですか？")) return;
  const it = ideas.find(x=>x.id===currentId);
  it.qaLog = [];
  await saveIdeas(); render();
}

async function runAsk(){
  const it = ideas.find(x=>x.id===currentId);
  const q = document.getElementById("f-q").value.trim();
  if(!q){ alert("質問を入れてください"); return; }
  askDraft = q;           // 失敗しても入力が消えないように控える
  asking = true; render();
  try{
    const a = await askFollowUp(it, q);
    qaLogOf(it).unshift({q:q, a:a, t:Date.now()});
    askDraft = "";        // 成功したら入力欄を空に
    await saveIdeas();
  }catch(e){
    console.error(e);
    lastError = "回答の取得に失敗しました。質問文は残してありますので、もう一度お試しください。";
  }
  asking = false; render();
}

function confirmReAnalyze(){
  if(!confirm("工程表を作り直します。今のチェック状況は消えますが、よろしいですか？")) return;
  runAnalyze();
}

/* ---------- 共有 ---------- */
async function shareIdea(){
  const it = ideas.find(x=>x.id===currentId);
  const p = it.plan;
  let t = `【${it.title}】\n`;
  if(it.memo) t += `${it.memo}\n`;
  t += `工程: ${STAGES.map((s,i)=>i<=it.stage?`[${s}]`:` ${s} `).join("")}（現在: ${STAGE_NAMES[STAGES[it.stage]]}）\n`;
  if(p){
    t += `\nコンセプト: ${p.concept}\nルート: ${p.route}\n`;
    const done = p.steps.filter(s=>s.done).length;
    t += `工程チェック: ${done}/${p.steps.length} 完了\n`;
    p.steps.forEach(s=>{ t += `${s.done?"☑":"☐"} [${s.stage}] ${s.text}\n`; });
  }
  t += `\n— ひらめき工房（叡智の灯火）`;
  try{
    if(navigator.share){ await navigator.share({title: it.title, text: t}); return; }
  }catch(e){ if(e.name==="AbortError") return; }
  try{
    await navigator.clipboard.writeText(t);
    alert("共有に対応していない環境のため、内容をコピーしました。メモやnoteに貼り付けられます。");
  }catch(e){
    alert("共有もコピーもできませんでした。お使いのブラウザの設定をご確認ください。");
  }
}

/* ---------- 図面の拡大表示 ---------- */
function openSvgModal(){
  const it = ideas.find(x=>x.id===currentId);
  if(!it || !it.svg) return;
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `<div class="hint">左右・上下にスクロールして図面全体を確認できます</div>
    <div class="pane">${it.svg}</div>
    <button class="close">閉じる</button>`;
  m.querySelector(".close").onclick = ()=> m.remove();
  document.body.appendChild(m);
}

/* ---------- 控え帳（バックアップ・引っ越し） ---------- */
function renderBackup(){
  app.innerHTML = `
    <button class="back" onclick="view='list';render()">← 台帳へ戻る</button>
    <h1 style="font-size:20px;margin-bottom:6px">控え帳</h1>
    <p class="tagline">データはこの端末のブラウザ内にだけ保存されています。機種変更や履歴消去に備えて、時々「控え」を取っておくと安心です。</p>
    ${backupMsg?`<div class="card" style="border-color:var(--ok);color:var(--ok);font-size:13px;font-weight:700">${esc(backupMsg)}</div>`:""}
    <div class="card">
      <div class="sec-title" style="margin-top:0">控えを取る（書き出し）</div>
      <p class="sec-body" style="margin-bottom:12px">全${ideas.length}件のアイデア・工程表・設計書・相談履歴を一つのテキストにまとめます。メモアプリ等に保存してください。</p>
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-primary" onclick="exportData('copy')">コピーする</button>
        <button class="btn btn-primary" onclick="exportData('file')">ファイル保存</button>
      </div>
    </div>
    <div class="card">
      <div class="sec-title" style="margin-top:0">控えから戻す（読み込み）</div>
      <p class="sec-body" style="margin-bottom:8px">以前書き出した控えを下に貼り付けてください。今の台帳と突き合わせ、控えにあるアイデアを取り込みます（同じアイデアは控えの内容で上書き）。</p>
      <textarea id="f-import" placeholder='{"app":"hirameki-kobo", ... } をここに貼り付け'></textarea>
      <div class="btn-row"><button class="btn btn-primary" onclick="importData()">読み込む</button></div>
    </div>`;
}

function exportPayload(){
  return JSON.stringify({app:"hirameki-kobo", ver:1, exported:new Date().toISOString(), ideas:ideas});
}
async function exportData(mode){
  const payload = exportPayload();
  if(mode==="copy"){
    try{
      await navigator.clipboard.writeText(payload);
      backupMsg = `控えをコピーしました（${ideas.length}件）。メモアプリ等に貼り付けて保存してください。`;
    }catch(e){
      backupMsg = "コピーできませんでした。「ファイル保存」をお試しください。";
    }
    render(); return;
  }
  const blob = new Blob([payload], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `hirameki-hikae-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
  backupMsg = `控えファイルを保存しました（${ideas.length}件）。`;
  render();
}
async function importData(){
  const raw = document.getElementById("f-import").value.trim();
  if(!raw){ alert("控えの内容を貼り付けてください"); return; }
  let data;
  try{ data = JSON.parse(raw); }
  catch(e){ alert("読み込めませんでした。控え全体（最初の { から最後の } まで）を貼り付けてください。"); return; }
  const list = Array.isArray(data) ? data : data.ideas;
  if(!Array.isArray(list) || (data.app && data.app!=="hirameki-kobo")){
    alert("ひらめき工房の控えではないようです。内容をご確認ください。"); return;
  }
  const valid = list.filter(x=>x && x.id && x.title);
  if(valid.length===0){ alert("控えの中にアイデアが見つかりませんでした。"); return; }
  if(!confirm(`控えから${valid.length}件を取り込みます。同じアイデアは控えの内容で上書きされます。よろしいですか？`)) return;
  let added=0, updated=0;
  for(const v of valid){
    const i = ideas.findIndex(x=>x.id===v.id);
    if(i>=0){ ideas[i]=v; updated++; } else { ideas.push(v); added++; }
  }
  await saveIdeas();
  backupMsg = `読み込み完了: 新規${added}件・上書き${updated}件（合計${ideas.length}件）`;
  render();
}

async function delIdea(){
  if(!confirm("このアイデアを削除します。よろしいですか？")) return;
  ideas = ideas.filter(x=>x.id!==currentId);
  await saveIdeas();
  view="list"; render();
}

/* ---------- 起動 ---------- */
(async()=>{ await loadIdeas(); render(); })();
</script>
